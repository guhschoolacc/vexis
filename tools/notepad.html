<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Notepad</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg: #0f172a;
      --bg-elevated: #111827;
      --accent: #38bdf8;
      --accent-soft: rgba(56, 189, 248, 0.15);
      --text: #e5e7eb;
      --muted: #9ca3af;
      --border: #1f2937;
      --danger: #f97373;
    }

    body.light {
      --bg: #f3f4f6;
      --bg-elevated: #ffffff;
      --accent: #2563eb;
      --accent-soft: rgba(37, 99, 235, 0.08);
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --danger: #dc2626;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1f2937 0, var(--bg) 45%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: stretch;
      padding: 24px;
    }

    .shell {
      width: 100%;
      max-width: 1100px;
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.96), rgba(15, 23, 42, 0.98));
      border-radius: 18px;
      border: 1px solid rgba(148, 163, 184, 0.25);
      box-shadow:
        0 24px 60px rgba(15, 23, 42, 0.85),
        0 0 0 1px rgba(15, 23, 42, 0.9);
      padding: 16px 18px 18px;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(22px) saturate(140%);
    }

    .top-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.4);
      background: radial-gradient(circle at top left, rgba(56, 189, 248, 0.12), rgba(15, 23, 42, 0.9));
      color: var(--text);
      font-size: 13px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.16s ease-out;
    }

    .back-btn span.icon {
      font-size: 14px;
      transform: translateY(0.5px);
    }

    .back-btn:hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.35);
      transform: translateY(-0.5px);
    }

    .title-block {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .title-main {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .title-sub {
      font-size: 11px;
      color: var(--muted);
    }

    .top-spacer {
      flex: 1;
    }

    .pill {
      font-size: 11px;
      padding: 4px 9px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.4);
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(15, 23, 42, 0.7);
    }

    .pill-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.18);
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 12px;
      background: radial-gradient(circle at top left, rgba(56, 189, 248, 0.12), rgba(15, 23, 42, 0.9));
      border: 1px solid rgba(148, 163, 184, 0.35);
      margin-bottom: 10px;
    }

    .toolbar-group {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding-right: 8px;
      margin-right: 4px;
      border-right: 1px solid rgba(148, 163, 184, 0.35);
    }

    .toolbar-group:last-child {
      border-right: none;
      margin-right: 0;
      padding-right: 0;
    }

    .btn {
      border: 1px solid rgba(148, 163, 184, 0.5);
      background: rgba(15, 23, 42, 0.9);
      color: var(--text);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: all 0.15s ease-out;
      white-space: nowrap;
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--accent), #22c1c3);
      border-color: rgba(15, 23, 42, 0.9);
      color: #0b1120;
      font-weight: 600;
    }

    .btn.danger {
      border-color: rgba(248, 113, 113, 0.7);
      color: var(--danger);
    }

    .btn-icon {
      font-size: 13px;
    }

    .btn:hover {
      transform: translateY(-0.5px);
      box-shadow: 0 0 0 1px rgba(148, 163, 184, 0.5);
      background: rgba(15, 23, 42, 0.95);
    }

    .btn.primary:hover {
      box-shadow:
        0 0 0 1px rgba(56, 189, 248, 0.7),
        0 10px 25px rgba(56, 189, 248, 0.35);
      filter: brightness(1.03);
    }

    .btn.danger:hover {
      box-shadow: 0 0 0 1px rgba(248, 113, 113, 0.7);
      background: rgba(15, 23, 42, 0.95);
    }

    .file-input {
      display: none;
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }

    .toggle-switch {
      width: 30px;
      height: 16px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.6);
      position: relative;
      transition: all 0.15s ease-out;
    }

    .toggle-knob {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: var(--accent);
      position: absolute;
      top: 1px;
      left: 1px;
      transition: all 0.15s ease-out;
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    body.light .toggle-knob {
      transform: translateX(12px);
    }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 11px;
      color: var(--muted);
      padding: 6px 10px;
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(148, 163, 184, 0.35);
      margin-bottom: 10px;
    }

    .status-left,
    .status-right {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .status-pill {
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.4);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: #22c55e;
      margin-right: 4px;
      display: inline-block;
    }

    .editor-shell {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-radius: 14px;
      background: radial-gradient(circle at top left, rgba(56, 189, 248, 0.08), rgba(15, 23, 42, 0.96));
      border: 1px solid rgba(148, 163, 184, 0.35);
      overflow: hidden;
      min-height: 260px;
    }

    .editor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.35);
      background: linear-gradient(90deg, rgba(15, 23, 42, 0.95), rgba(15, 23, 42, 0.9));
      font-size: 12px;
      color: var(--muted);
    }

    .filename-input {
      border: none;
      background: transparent;
      color: var(--text);
      font-size: 12px;
      padding: 3px 6px;
      border-radius: 999px;
      outline: none;
      min-width: 0;
    }

    .filename-wrapper {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.4);
    }

    .editor-main {
      flex: 1;
      position: relative;
    }

    textarea {
      width: 100%;
      height: 100%;
      border: none;
      resize: none;
      padding: 14px 14px 16px;
      font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco,
        Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 13px;
      line-height: 1.5;
      color: var(--text);
      background: transparent;
      outline: none;
      caret-color: var(--accent);
    }

    textarea::placeholder {
      color: rgba(148, 163, 184, 0.7);
    }

    .editor-main::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image: linear-gradient(
        to bottom,
        rgba(148, 163, 184, 0.12) 1px,
        transparent 1px
      );
      background-size: 100% 24px;
      opacity: 0.18;
      mix-blend-mode: soft-light;
    }

    @media (max-width: 768px) {
      body {
        padding: 12px;
      }
      .shell {
        padding: 12px;
      }
      .toolbar {
        flex-wrap: wrap;
      }
      .toolbar-group {
        border-right: none;
        margin-right: 0;
        padding-right: 0;
      }
      .status-bar {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <!-- Top bar with Back to Dashboard -->
    <div class="top-bar">
      
      <div class="title-block">
        <div class="title-main">Notepad</div>
        <div class="title-sub">Quick notes with autosave, file open/save, and stats</div>
      </div>
      <div class="top-spacer"></div>
      <div class="pill">
        <span class="pill-dot"></span>
        <span>Autosave enabled</span>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="toolbar-group">
        <button class="btn" id="newBtn">
          <span class="btn-icon">📝</span>
          <span>New</span>
        </button>

        <label class="btn" for="fileInput">
          <span class="btn-icon">📂</span>
          <span>Open</span>
        </label>
        <input type="file" id="fileInput" class="file-input" accept=".txt,.md,.log,.json,.csv,.html,.js,.css,.*" />

        <button class="btn primary" id="saveBtn">
          <span class="btn-icon">💾</span>
          <span>Save</span>
        </button>
      </div>

      <div class="toolbar-group">
        <button class="btn danger" id="clearBtn">
          <span class="btn-icon">🧹</span>
          <span>Clear</span>
        </button>
      </div>

      <div class="toolbar-group">
        <label class="toggle" id="themeToggle">
          <div class="toggle-switch">
            <div class="toggle-knob"></div>
          </div>
          <span>Light mode</span>
        </label>
      </div>
    </div>

    <!-- Status bar -->
    <div class="status-bar">
      <div class="status-left">
        <div class="status-pill">
          <span class="status-dot"></span>
          <span id="statusText">All changes saved</span>
        </div>
        <div class="status-pill">
          <span id="wordCount">0</span> words
        </div>
        <div class="status-pill">
          <span id="charCount">0</span> characters
        </div>
      </div>
      <div class="status-right">
        <div class="status-pill">
          Last saved: <span id="lastSaved">–</span>
        </div>
      </div>
    </div>

    <!-- Editor -->
    <div class="editor-shell">
      <div class="editor-header">
        <div class="filename-wrapper">
          <span>File:</span>
          <input
            type="text"
            id="filenameInput"
            class="filename-input"
            value="untitled.txt"
            spellcheck="false"
          />
        </div>
        <div>Plain text editor</div>
      </div>
      <div class="editor-main">
        <textarea
          id="editor"
          placeholder="Start typing your notes here..."
          spellcheck="true"
        ></textarea>
      </div>
    </div>
  </div>

  <script>
    const editor = document.getElementById("editor");
    const newBtn = document.getElementById("newBtn");
    const saveBtn = document.getElementById("saveBtn");
    const clearBtn = document.getElementById("clearBtn");
    const fileInput = document.getElementById("fileInput");
    const wordCountEl = document.getElementById("wordCount");
    const charCountEl = document.getElementById("charCount");
    const statusText = document.getElementById("statusText");
    const lastSavedEl = document.getElementById("lastSaved");
    const filenameInput = document.getElementById("filenameInput");
    const themeToggle = document.getElementById("themeToggle");

    const STORAGE_KEY = "premium_notepad_content";
    const THEME_KEY = "premium_notepad_theme";
    const FILENAME_KEY = "premium_notepad_filename";

    function updateCounts() {
      const text = editor.value;
      const chars = text.length;
      const words = text.trim()
        ? text.trim().split(/\s+/).filter(Boolean).length
        : 0;

      wordCountEl.textContent = words;
      charCountEl.textContent = chars;
    }

    function setStatus(message, saved = false) {
      statusText.textContent = message;
      if (saved) {
        const now = new Date();
        const timeString = now.toLocaleTimeString([], {
          hour: "2-digit",
          minute: "2-digit",
        });
        lastSavedEl.textContent = timeString;
      }
    }

    function saveToLocalStorage() {
      localStorage.setItem(STORAGE_KEY, editor.value);
      localStorage.setItem(FILENAME_KEY, filenameInput.value || "untitled.txt");
      setStatus("All changes saved", true);
    }

    function loadFromLocalStorage() {
      const saved = localStorage.getItem(STORAGE_KEY);
      const savedFilename = localStorage.getItem(FILENAME_KEY);
      if (saved !== null) {
        editor.value = saved;
      }
      if (savedFilename) {
        filenameInput.value = savedFilename;
      }
      updateCounts();
      if (saved) {
        setStatus("Loaded from previous session", false);
      }
    }

    function downloadFile() {
      const text = editor.value;
      let filename = filenameInput.value.trim() || "untitled.txt";
      if (!filename.includes(".")) {
        filename += ".txt";
      }

      const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      setStatus("File downloaded", true);
      saveToLocalStorage();
    }

    function handleFileOpen(file) {
      const reader = new FileReader();
      reader.onload = function (e) {
        editor.value = e.target.result;
        filenameInput.value = file.name || "untitled.txt";
        updateCounts();
        saveToLocalStorage();
        setStatus("File loaded", true);
      };
      reader.readAsText(file);
    }

    function setTheme(theme) {
      if (theme === "light") {
        document.body.classList.add("light");
      } else {
        document.body.classList.remove("light");
      }
      localStorage.setItem(THEME_KEY, theme);
    }

    function loadTheme() {
      const savedTheme = localStorage.getItem(THEME_KEY);
      if (savedTheme === "light") {
        setTheme("light");
      } else {
        setTheme("dark");
      }
    }

    // Event listeners
    editor.addEventListener("input", () => {
      updateCounts();
      setStatus("Editing…");
      // Debounced-ish autosave
      if (editor._saveTimeout) {
        clearTimeout(editor._saveTimeout);
      }
      editor._saveTimeout = setTimeout(saveToLocalStorage, 500);
    });

    newBtn.addEventListener("click", () => {
      if (editor.value.trim().length > 0) {
        const confirmNew = confirm(
          "Start a new note? Unsaved changes are already stored locally, but this will clear the editor."
        );
        if (!confirmNew) return;
      }
      editor.value = "";
      filenameInput.value = "untitled.txt";
      updateCounts();
      saveToLocalStorage();
      setStatus("New note created", true);
    });

    saveBtn.addEventListener("click", () => {
      downloadFile();
    });

    clearBtn.addEventListener("click", () => {
      const confirmClear = confirm(
        "Clear all text? This will also overwrite the autosaved content."
      );
      if (!confirmClear) return;
      editor.value = "";
      updateCounts();
      saveToLocalStorage();
      setStatus("Editor cleared", true);
    });

    fileInput.addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (!file) return;
      handleFileOpen(file);
      fileInput.value = "";
    });

    filenameInput.addEventListener("input", () => {
      setStatus("Filename updated");
      if (filenameInput._saveTimeout) {
        clearTimeout(filenameInput._saveTimeout);
      }
      filenameInput._saveTimeout = setTimeout(saveToLocalStorage, 500);
    });

    themeToggle.addEventListener("click", () => {
      const isLight = document.body.classList.contains("light");
      setTheme(isLight ? "dark" : "light");
    });

    // Initial load
    loadTheme();
    loadFromLocalStorage();
    setStatus("Ready");

  </script>
</body>
</html>
