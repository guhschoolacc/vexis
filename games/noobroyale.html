<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noob Royale - 3D FPS Battle Royale</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; cursor: default; }

#menu {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  z-index: 1000; display: flex; align-items: center; justify-content: center;
  flex-direction: column; color: white;
}
#menu h1 { font-size: 58px; color: #FFD700; text-shadow: 3px 3px 0 #c7a600; margin-bottom: 5px; letter-spacing: 2px; }
#menu h2 { font-size: 20px; color: #aaa; margin-bottom: 35px; }
#menu .start-btn {
  padding: 18px 60px; font-size: 26px; background: linear-gradient(135deg, #FFD700, #FFA500);
  border: none; border-radius: 12px; cursor: pointer; color: #333; font-weight: bold;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 25px rgba(255,165,0,0.5);
}
#menu .start-btn:hover { transform: scale(1.08); box-shadow: 0 6px 35px rgba(255,165,0,0.7); }
#menu .instructions { color: #778; margin-top: 25px; text-align: center; line-height: 2; font-size: 15px; }
#menu .instructions b { color: #ccc; }

#gameCanvas { display: block; width: 100vw; height: 100vh; }

#hud {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 10; display: none;
}

/* Crosshair */
.crosshair {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 24px; height: 24px;
}
.crosshair::before, .crosshair::after {
  content: ''; position: absolute; background: rgba(255,255,255,0.85);
}
.crosshair::before { width: 2px; height: 24px; left: 11px; top: 0; }
.crosshair::after { width: 24px; height: 2px; top: 11px; left: 0; }
.crosshair-dot {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  width: 4px; height: 4px; background: rgba(255,255,255,0.9); border-radius: 50%;
}

#hp-wrap {
  position: absolute; bottom: 28px; left: 28px;
}
#hp-label { color: #fff; font-size: 14px; font-weight: bold; margin-bottom: 4px; text-shadow: 1px 1px 3px #000; }
#hp-bar-outer {
  width: 220px; height: 22px; background: rgba(0,0,0,0.55); border: 2px solid rgba(255,255,255,0.25);
  border-radius: 11px; overflow: hidden;
}
#hp-bar {
  height: 100%; width: 100%; background: linear-gradient(90deg, #e74c3c, #ff6b6b);
  transition: width 0.25s; border-radius: 9px;
}

#ammo-wrap {
  position: absolute; bottom: 28px; right: 28px; text-align: right;
}
#ammo-num { color: #fff; font-size: 36px; font-weight: bold; text-shadow: 2px 2px 5px #000; }
#ammo-max { color: #999; font-size: 16px; }
#weapon-name { color: #bbb; font-size: 14px; margin-top: 2px; text-shadow: 1px 1px 3px #000; }

#kills-display {
  position: absolute; top: 18px; right: 28px; color: #FFD700;
  font-size: 26px; font-weight: bold; text-shadow: 2px 2px 5px #000;
}

#timer-display {
  position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
  color: #fff; font-size: 30px; font-weight: bold;
  text-shadow: 2px 2px 5px #000; background: rgba(0,0,0,0.35);
  padding: 4px 22px; border-radius: 8px;
}

#alive-display {
  position: absolute; top: 18px; left: 28px; color: #4fc3f7;
  font-size: 18px; font-weight: bold; text-shadow: 1px 1px 4px #000;
}

#kill-feed {
  position: absolute; top: 60px; right: 28px; text-align: right;
}
.kf-entry {
  color: #fff; font-size: 13px; padding: 3px 8px; margin-bottom: 3px;
  background: rgba(0,0,0,0.45); border-radius: 4px; text-shadow: 1px 1px 2px #000;
  animation: kfIn 0.3s;
}
@keyframes kfIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; } }

#dmg-flash {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 9; opacity: 0;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(255,0,0,0.35) 100%);
  transition: opacity 0.08s;
}

#hitmarker {
  position: fixed; top: 50%; left: 50%; width: 30px; height: 30px;
  transform: translate(-50%,-50%); z-index: 12; pointer-events: none; display: none;
}

#minimap-wrap {
  position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
  width: 150px; height: 150px; border-radius: 50%; overflow: hidden;
  border: 2px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.4);
}
#minimap-c { width: 150px; height: 150px; }

#pause-msg {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
  color: #fff; font-size: 22px; background: rgba(0,0,0,0.7); padding: 20px 40px;
  border-radius: 10px; z-index: 50; display: none; text-align: center;
}

#gameover {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.88); z-index: 200; display: none;
  align-items: center; justify-content: center; flex-direction: column; color: #fff;
}
#gameover h1 { font-size: 50px; margin-bottom: 15px; }
#gameover .go-stat { font-size: 22px; margin: 6px 0; color: #ccc; }
#gameover .go-btn {
  padding: 14px 45px; font-size: 22px; background: linear-gradient(135deg, #FFD700, #FFA500);
  border: none; border-radius: 10px; cursor: pointer; color: #333; font-weight: bold;
  margin-top: 28px; transition: transform 0.2s; pointer-events: all;
}
#gameover .go-btn:hover { transform: scale(1.08); }

#reload-msg {
  position: absolute; top: 60%; left: 50%; transform: translateX(-50%);
  color: #FFD700; font-size: 18px; font-weight: bold; display: none;
  text-shadow: 1px 1px 4px #000;
}
</style>
</head>
<body>

<!-- MENU -->
<div id="menu">
  <h1>NOOB ROYALE</h1>
  <h2>3D Battle Royale FPS</h2>
  <button class="start-btn" id="startBtn">START GAME</button>
  <div class="instructions">
    <p><b>WASD</b> Move &nbsp;|&nbsp; <b>Mouse</b> Aim &nbsp;|&nbsp; <b>Left Click</b> Shoot &nbsp;|&nbsp; <b>R</b> Reload &nbsp;|&nbsp; <b>Space</b> Jump</p>
    <p>Kill AI Noobs &bull; 5 Min Rounds &bull; Most Kills Wins!</p>
  </div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="crosshair"><div class="crosshair-dot"></div></div>
  <div id="hp-wrap">
    <div id="hp-label">HP: 100</div>
    <div id="hp-bar-outer"><div id="hp-bar"></div></div>
  </div>
  <div id="ammo-wrap">
    <div><span id="ammo-num">30</span> <span id="ammo-max">/ 30</span></div>
    <div id="weapon-name">Assault Rifle</div>
  </div>
  <div id="kills-display">Kills: 0</div>
  <div id="timer-display">5:00</div>
  <div id="alive-display">Alive: 11</div>
  <div id="kill-feed"></div>
  <div id="minimap-wrap"><canvas id="minimap-c" width="150" height="150"></canvas></div>
  <div id="reload-msg">RELOADING...</div>
</div>

<div id="dmg-flash"></div>

<svg id="hitmarker" viewBox="0 0 30 30">
  <line x1="8" y1="8" x2="12" y2="12" stroke="white" stroke-width="2.5"/>
  <line x1="22" y1="8" x2="18" y2="12" stroke="white" stroke-width="2.5"/>
  <line x1="8" y1="22" x2="12" y2="18" stroke="white" stroke-width="2.5"/>
  <line x1="22" y1="22" x2="18" y2="18" stroke="white" stroke-width="2.5"/>
</svg>

<div id="pause-msg">Click to resume<br><span style="font-size:14px;color:#aaa">ESC to pause</span></div>

<div id="gameover">
  <h1 id="go-title">GAME OVER</h1>
  <div class="go-stat" id="go-kills">Kills: 0</div>
  <div class="go-stat" id="go-deaths">Deaths: 0</div>
  <div class="go-stat" id="go-acc">Accuracy: 0%</div>
  <button class="go-btn" onclick="location.reload()">PLAY AGAIN</button>
</div>

<!-- THREE.JS -->
<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js';

// ════════════════════════════════════════
//  CONSTANTS
// ════════════════════════════════════════
const ROUND_TIME = 300; // 5 min
const MAP_SIZE = 180;
const NUM_AI = 10;
const PLAYER_H = 4;
const PLAYER_SPEED = 16;
const GRAVITY = -28;
const JUMP_V = 10.5;
const FIRE_RATE = 140; // ms

// ════════════════════════════════════════
//  STATE
// ════════════════════════════════════════
let started = false, over = false, paused = false;
let hp = 100, maxHp = 100;
let ammo = 30, maxAmmo = 30, reloading = false;
let kills = 0, deaths = 0, shotsFired = 0, shotsHit = 0;
let timeLeft = ROUND_TIME;
let velY = 0, grounded = true;
let canFire = true;
let yaw = 0, pitch = 0;
const keys = {};

// ════════════════════════════════════════
//  RENDERER / SCENE / CAMERA
// ════════════════════════════════════════
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.domElement.id = 'gameCanvas';
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x7ec8e3);
scene.fog = new THREE.FogExp2(0x7ec8e3, 0.004);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, PLAYER_H, 0);
scene.add(camera);

// ════════════════════════════════════════
//  LIGHTING
// ════════════════════════════════════════
scene.add(new THREE.AmbientLight(0xffffff, 0.55));
const sun = new THREE.DirectionalLight(0xffffff, 0.85);
sun.position.set(60, 100, 40);
sun.castShadow = true;
const s = 160;
sun.shadow.camera.left = -s; sun.shadow.camera.right = s;
sun.shadow.camera.top = s; sun.shadow.camera.bottom = -s;
sun.shadow.camera.far = 300;
sun.shadow.mapSize.width = 2048;
sun.shadow.mapSize.height = 2048;
scene.add(sun);

// ════════════════════════════════════════
//  MAP
// ════════════════════════════════════════
const colliders = []; // { x, z, hw, hd } (half-width, half-depth)

// Ground
const gnd = new THREE.Mesh(
  new THREE.PlaneGeometry(MAP_SIZE * 2.2, MAP_SIZE * 2.2),
  new THREE.MeshLambertMaterial({ color: 0x5a9e4b })
);
gnd.rotation.x = -Math.PI / 2;
gnd.receiveShadow = true;
scene.add(gnd);

// Helper to add a box obstacle
const obstacleMeshes = [];
function addBox(x, z, w, h, d, color) {
  const m = new THREE.Mesh(
    new THREE.BoxGeometry(w, h, d),
    new THREE.MeshLambertMaterial({ color })
  );
  m.position.set(x, h / 2, z);
  m.castShadow = true;
  m.receiveShadow = true;
  scene.add(m);
  obstacleMeshes.push(m);
  colliders.push({ x, z, hw: w / 2, hd: d / 2 });
}

// Buildings
const blds = [
  [0,0,14,16,14,0x888888],
  [30,18,9,11,9,0x996633],[-28,-18,11,9,7,0xaa8855],
  [18,-28,7,13,7,0x777777],[-18,28,9,7,11,0x665544],
  [65,65,15,11,15,0x887766],[-65,65,11,15,11,0x999999],
  [65,-65,13,9,9,0xaa7744],[-65,-65,9,17,9,0x666666],
  [85,0,7,11,22,0x885533],[-85,0,22,7,7,0x778866],
  [0,85,11,13,11,0x998877],[0,-85,9,9,18,0x776655],
  [42,32,18,5,2,0xaaaaaa],[-42,-32,2,5,18,0xaaaaaa],
  [32,-55,14,6,2,0xbbbbbb],[-32,55,2,6,14,0xbbbbbb],
  [48,-22,7,8,7,0x887766],[-48,22,7,10,7,0x776655],
  [22,52,9,7,5,0x998877],[-22,-52,5,7,9,0x665544],
  [95,42,11,13,11,0x888888],[-95,-42,11,11,11,0x777777],
  [42,95,9,15,9,0x999999],[-42,-95,9,9,9,0x666666],
  [-50,80,8,10,8,0x887755],[50,-80,10,8,6,0x776644],
  [110,-20,8,12,8,0x998866],[-110,30,8,8,14,0x887755],
];
blds.forEach(b => addBox(b[0], b[1], b[2], b[3], b[4], b[5]));

// Crates
for (let i = 0; i < 35; i++) {
  const sz = 1.5 + Math.random() * 2;
  addBox(
    (Math.random() - 0.5) * MAP_SIZE * 1.7,
    (Math.random() - 0.5) * MAP_SIZE * 1.7,
    sz, sz, sz, 0x8B7355
  );
}

// Trees (decorative, no collision)
for (let i = 0; i < 50; i++) {
  const tx = (Math.random() - 0.5) * MAP_SIZE * 1.9;
  const tz = (Math.random() - 0.5) * MAP_SIZE * 1.9;
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.45, 0.55, 5, 6),
    new THREE.MeshLambertMaterial({ color: 0x8B4513 })
  );
  trunk.position.set(tx, 2.5, tz);
  trunk.castShadow = true;
  scene.add(trunk);
  const leaves = new THREE.Mesh(
    new THREE.ConeGeometry(3.2, 6.5, 6),
    new THREE.MeshLambertMaterial({ color: 0x228B22 })
  );
  leaves.position.set(tx, 8, tz);
  leaves.castShadow = true;
  scene.add(leaves);
}

// Boundary walls (invisible-ish)
const wallMat = new THREE.MeshLambertMaterial({ color: 0xcc3333, transparent: true, opacity: 0.18 });
[[MAP_SIZE,0,2,20,MAP_SIZE*2],[-MAP_SIZE,0,2,20,MAP_SIZE*2],
 [0,MAP_SIZE,MAP_SIZE*2,20,2],[0,-MAP_SIZE,MAP_SIZE*2,20,2]].forEach(w => {
  const wm = new THREE.Mesh(new THREE.BoxGeometry(w[2],w[3],w[4]), wallMat);
  wm.position.set(w[0], w[3]/2, w[1]);
  scene.add(wm);
});

// ════════════════════════════════════════
//  NOOB MODEL BUILDER
// ════════════════════════════════════════
function buildNoob() {
  const g = new THREE.Group();
  const headMat = new THREE.MeshLambertMaterial({ color: 0xFFCC00 });
  const torsoMat = new THREE.MeshLambertMaterial({ color: 0x0057FF });
  const legMat = new THREE.MeshLambertMaterial({ color: 0x00A800 });
  const skinMat = new THREE.MeshLambertMaterial({ color: 0xFFCC00 });
  const eyeMat = new THREE.MeshBasicMaterial({ color: 0x111111 });

  // head
  const head = new THREE.Mesh(new THREE.BoxGeometry(2,2,2), headMat);
  head.position.y = 5.5; head.castShadow = true; g.add(head);
  // eyes
  const eL = new THREE.Mesh(new THREE.BoxGeometry(0.32,0.32,0.1), eyeMat);
  eL.position.set(-0.42,5.6,1.01); g.add(eL);
  const eR = new THREE.Mesh(new THREE.BoxGeometry(0.32,0.32,0.1), eyeMat);
  eR.position.set(0.42,5.6,1.01); g.add(eR);
  // smile
  const sm = new THREE.Mesh(new THREE.BoxGeometry(0.75,0.15,0.1), eyeMat);
  sm.position.set(0,5.15,1.01); g.add(sm);
  // torso
  const torso = new THREE.Mesh(new THREE.BoxGeometry(2,2.5,1.2), torsoMat);
  torso.position.y = 3.25; torso.castShadow = true; g.add(torso);
  // arms
  const aL = new THREE.Mesh(new THREE.BoxGeometry(1,2.5,1.2), skinMat);
  aL.position.set(-1.5,3.25,0); aL.castShadow = true; g.add(aL);
  const aR = new THREE.Mesh(new THREE.BoxGeometry(1,2.5,1.2), skinMat);
  aR.position.set(1.5,3.25,0); aR.castShadow = true; g.add(aR);
  // legs
  const lL = new THREE.Mesh(new THREE.BoxGeometry(0.9,2.5,1.2), legMat);
  lL.position.set(-0.5,1.0,0); lL.castShadow = true; g.add(lL);
  const lR = new THREE.Mesh(new THREE.BoxGeometry(0.9,2.5,1.2), legMat);
  lR.position.set(0.5,1.0,0); lR.castShadow = true; g.add(lR);
  // gun in hand
  const gun = new THREE.Mesh(new THREE.BoxGeometry(0.25,0.25,1.6), new THREE.MeshLambertMaterial({color:0x333333}));
  gun.position.set(1.5,3.5,1.2); g.add(gun);

  g.userData = { aL, aR, lL, lR };
  return g;
}

// ════════════════════════════════════════
//  FIRST-PERSON WEAPON
// ════════════════════════════════════════
const wpn = new THREE.Group();
const wb = new THREE.Mesh(new THREE.BoxGeometry(0.14,0.14,0.75), new THREE.MeshLambertMaterial({color:0x333333}));
wpn.add(wb);
const wg = new THREE.Mesh(new THREE.BoxGeometry(0.09,0.28,0.14), new THREE.MeshLambertMaterial({color:0x222222}));
wg.position.set(0,-0.18,0.12); wpn.add(wg);
const wbr = new THREE.Mesh(new THREE.BoxGeometry(0.07,0.07,0.38), new THREE.MeshLambertMaterial({color:0x444444}));
wbr.position.set(0,0.02,-0.56); wpn.add(wbr);
const wh = new THREE.Mesh(new THREE.BoxGeometry(0.18,0.22,0.18), new THREE.MeshLambertMaterial({color:0xFFCC00}));
wh.position.set(0,-0.1,0.2); wpn.add(wh);
wpn.position.set(0.32,-0.32,-0.55);
camera.add(wpn);

// ════════════════════════════════════════
//  AI CLASS
// ════════════════════════════════════════
const aiNames = ['Noob123','xXSlayerXx','ProGamer99','CoolDude','N00bMaster',
  'BuilderBob','RobloxFan','EpicNoob42','GamerzLife','PixelKing','BlockHead','StarPlay3r'];

class Bot {
  constructor(i) {
    this.id = i;
    this.name = aiNames[i % aiNames.length];
    this.hp = 100;
    this.alive = true;
    this.kills = 0;
    this.model = buildNoob();
    scene.add(this.model);
    this.respawnTimer = 0;

    this.accuracy = 0.2 + Math.random() * 0.3;   // 20-50 %
    this.speed = 5 + Math.random() * 5;           // 5-10
    this.reactionDelay = 0.4 + Math.random() * 0.8;

    this.state = 'wander';
    this.stateT = 0;
    this.goal = this.rndPos();
    this.shootCD = 0;
    this.target = null;
    this.anim = Math.random() * 6;

    // overhead healthbar
    const hc = document.createElement('canvas');
    hc.width = 128; hc.height = 16;
    this.hCtx = hc.getContext('2d');
    this.hTex = new THREE.CanvasTexture(hc);
    const hs = new THREE.Sprite(new THREE.SpriteMaterial({ map: this.hTex, depthTest: false }));
    hs.position.y = 7.8; hs.scale.set(3, 0.4, 1);
    this.model.add(hs);

    // overhead name
    const nc = document.createElement('canvas');
    nc.width = 256; nc.height = 32;
    const nx = nc.getContext('2d');
    nx.fillStyle = 'rgba(0,0,0,0.5)'; nx.fillRect(0,0,256,32);
    nx.fillStyle = '#fff'; nx.font = 'bold 18px Arial'; nx.textAlign = 'center';
    nx.fillText(this.name, 128, 22);
    const ns = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(nc), depthTest: false }));
    ns.position.y = 8.5; ns.scale.set(4, 0.5, 1);
    this.model.add(ns);

    this.spawn();
  }
  rndPos() {
    return new THREE.Vector3((Math.random()-0.5)*MAP_SIZE*1.5, 0, (Math.random()-0.5)*MAP_SIZE*1.5);
  }
  spawn() {
    const p = this.rndPos();
    this.model.position.copy(p);
    this.hp = 100;
    this.alive = true;
    this.model.visible = true;
    this.state = 'wander';
    this.goal = this.rndPos();
    this.drawHP();
  }
  drawHP() {
    const c = this.hCtx;
    c.clearRect(0,0,128,16);
    c.fillStyle = 'rgba(0,0,0,0.55)';
    c.fillRect(0,0,128,16);
    const p = Math.max(0, this.hp / 100);
    c.fillStyle = p > 0.5 ? '#44ff44' : p > 0.25 ? '#ffaa00' : '#ff4444';
    c.fillRect(2,2,124*p,12);
    this.hTex.needsUpdate = true;
  }
  damage(amt, byPlayer) {
    if (!this.alive) return;
    this.hp -= amt;
    this.drawHP();
    if (this.hp <= 0) {
      this.hp = 0; this.alive = false; this.model.visible = false;
      this.respawnTimer = 5 + Math.random()*2;
      if (byPlayer) {
        kills++; shotsHit++;
        elKills.textContent = 'Kills: ' + kills;
        feedKill('You', this.name);
        hitMark(true);
      }
      refreshAlive();
    } else if (byPlayer) {
      this.state = 'chase';
      this.target = 'player';
      this.stateT = 4;
      hitMark(false);
    }
  }
  collides(nx, nz) {
    const r = 1;
    for (const c of colliders) {
      if (nx+r > c.x-c.hw && nx-r < c.x+c.hw && nz+r > c.z-c.hd && nz-r < c.z+c.hd) return true;
    }
    return false;
  }
  update(dt) {
    if (!this.alive) {
      this.respawnTimer -= dt;
      if (this.respawnTimer <= 0) { this.spawn(); refreshAlive(); }
      return;
    }
    this.anim += dt * 5;
    this.stateT -= dt;
    this.shootCD -= dt;

    const pos = this.model.position;
    const pPos = camera.position;
    const distP = pos.distanceTo(new THREE.Vector3(pPos.x, 0, pPos.z));

    // decide state
    if (this.stateT <= 0) {
      if (distP < 55 && Math.random() < 0.55) {
        this.state = 'chase'; this.target = 'player'; this.stateT = 3 + Math.random()*3;
      } else if (this.hp < 30 && Math.random() < 0.4) {
        this.state = 'flee'; this.stateT = 2 + Math.random()*2;
      } else {
        // look for nearby AI
        let nb = null, nd = 55;
        bots.forEach(o => { if (o !== this && o.alive) { const dd = pos.distanceTo(o.model.position); if (dd < nd) { nd = dd; nb = o; }}});
        if (nb && Math.random() < 0.35) {
          this.state = 'chase'; this.target = nb; this.stateT = 3 + Math.random()*3;
        } else {
          this.state = 'wander'; this.goal = this.rndPos(); this.stateT = 4 + Math.random()*4;
        }
      }
    }

    let moveTarget = null, shooting = false;

    if (this.state === 'wander') {
      moveTarget = this.goal;
    } else if (this.state === 'chase') {
      if (this.target === 'player') {
        moveTarget = new THREE.Vector3(pPos.x, 0, pPos.z);
        if (distP < 40 && distP > 6) shooting = true;
        else if (distP <= 6) {
          shooting = true;
          const ang = Math.atan2(pPos.z - pos.z, pPos.x - pos.x) + Math.PI/2;
          moveTarget = new THREE.Vector3(pos.x + Math.cos(ang)*10, 0, pos.z + Math.sin(ang)*10);
        }
      } else if (this.target && this.target.alive) {
        const ep = this.target.model.position;
        moveTarget = ep.clone();
        if (pos.distanceTo(ep) < 40) shooting = true;
      } else { this.state = 'wander'; this.goal = this.rndPos(); }
    } else if (this.state === 'flee') {
      const fa = Math.atan2(pos.z - pPos.z, pos.x - pPos.x);
      moveTarget = new THREE.Vector3(pos.x + Math.cos(fa)*35, 0, pos.z + Math.sin(fa)*35);
    }

    if (moveTarget) {
      const dir = new THREE.Vector3().subVectors(moveTarget, pos); dir.y = 0;
      if (dir.length() > 1) {
        dir.normalize();
        const nx = pos.x + dir.x * this.speed * dt;
        const nz = pos.z + dir.z * this.speed * dt;
        if (!this.collides(nx, nz)) { pos.x = nx; pos.z = nz; }
        else if (!this.collides(nx, pos.z)) pos.x = nx;
        else if (!this.collides(pos.x, nz)) pos.z = nz;

        if (shooting && this.target) {
          const lp = this.target === 'player' ? pPos : this.target.model.position;
          this.model.rotation.y = Math.atan2(lp.x - pos.x, lp.z - pos.z);
        } else {
          this.model.rotation.y = Math.atan2(dir.x, dir.z);
        }
        // animate limbs
        const sw = Math.sin(this.anim) * 0.5;
        const ud = this.model.userData;
        ud.lL.rotation.x = sw; ud.lR.rotation.x = -sw;
        ud.aL.rotation.x = -sw*0.5; ud.aR.rotation.x = sw*0.5;
      }
    }
    pos.x = Math.max(-MAP_SIZE+2, Math.min(MAP_SIZE-2, pos.x));
    pos.z = Math.max(-MAP_SIZE+2, Math.min(MAP_SIZE-2, pos.z));

    if (shooting && this.shootCD <= 0) {
      this.fire();
      this.shootCD = 0.35 + Math.random() * 0.55;
    }
  }
  fire() {
    // muzzle flash
    const fl = new THREE.Mesh(new THREE.SphereGeometry(0.3,4,4), new THREE.MeshBasicMaterial({color:0xFFFF00}));
    const fwd = new THREE.Vector3(0,0,1).applyAxisAngle(new THREE.Vector3(0,1,0), this.model.rotation.y);
    fl.position.set(this.model.position.x + fwd.x*2.5, 3.5, this.model.position.z + fwd.z*2.5);
    scene.add(fl); setTimeout(() => scene.remove(fl), 80);

    if (this.target === 'player') {
      // LOS check
      const origin = new THREE.Vector3(this.model.position.x, 3, this.model.position.z);
      const dir = new THREE.Vector3().subVectors(camera.position, origin).normalize();
      const rc = new THREE.Raycaster(origin, dir);
      const hits = rc.intersectObjects(obstacleMeshes);
      const pDist = origin.distanceTo(camera.position);
      if (hits.length > 0 && hits[0].distance < pDist) return; // blocked
      if (Math.random() < this.accuracy) {
        playerHit(7 + Math.floor(Math.random() * 8));
      }
    } else if (this.target && this.target.alive) {
      if (Math.random() < this.accuracy * 0.65) {
        const dmg = 7 + Math.floor(Math.random() * 8);
        const wasAlive = this.target.alive;
        this.target.damage(dmg, false);
        if (!this.target.alive && wasAlive) {
          this.kills++;
          feedKill(this.name, this.target.name);
        }
      }
    }
  }
}

const bots = [];
for (let i = 0; i < NUM_AI; i++) bots.push(new Bot(i));

// ════════════════════════════════════════
//  PLAYER FUNCS
// ════════════════════════════════════════
function playerHit(dmg) {
  if (over) return;
  hp -= dmg;
  if (hp < 0) hp = 0;
  updateHP();
  elDmg.style.opacity = '1';
  setTimeout(() => elDmg.style.opacity = '0', 180);
  if (hp <= 0) {
    deaths++;
    hp = maxHp;
    const sp = spawnPt();
    camera.position.set(sp.x, PLAYER_H, sp.z);
    updateHP();
  }
}

function spawnPt() {
  for (let i = 0; i < 30; i++) {
    const x = (Math.random()-0.5)*MAP_SIZE*1.5;
    const z = (Math.random()-0.5)*MAP_SIZE*1.5;
    let ok = true;
    for (const c of colliders) {
      if (Math.abs(x-c.x) < c.hw+3 && Math.abs(z-c.z) < c.hd+3) { ok = false; break; }
    }
    if (ok) return { x, z };
  }
  return { x: 20, z: 20 };
}

function playerCollides(x, z) {
  const r = 0.7;
  for (const c of colliders) {
    if (x+r > c.x-c.hw && x-r < c.x+c.hw && z+r > c.z-c.hd && z-r < c.z+c.hd) return true;
  }
  return false;
}

function updateHP() {
  elHPbar.style.width = (hp/maxHp*100) + '%';
  elHPtxt.textContent = 'HP: ' + Math.ceil(hp);
}
function updateAmmo() {
  elAmmoNum.textContent = ammo;
}

function refreshAlive() {
  const n = bots.filter(b => b.alive).length + (hp > 0 ? 1 : 0);
  elAlive.textContent = 'Alive: ' + n;
}

// ════════════════════════════════════════
//  SHOOTING
// ════════════════════════════════════════
const trails = [];

function playerShoot() {
  if (!canFire || reloading || ammo <= 0 || over || paused) return;
  canFire = false;
  ammo--; shotsFired++;
  updateAmmo();

  // recoil
  wpn.position.z += 0.07;
  wpn.rotation.x -= 0.04;
  setTimeout(() => { wpn.position.z = -0.55; wpn.rotation.x = 0; }, 80);

  // flash
  const mf = new THREE.Mesh(new THREE.SphereGeometry(0.04,4,4), new THREE.MeshBasicMaterial({color:0xFFFF00}));
  mf.position.set(0,0.02,-0.95); wpn.add(mf);
  setTimeout(() => wpn.remove(mf), 50);

  // raycast
  const rc = new THREE.Raycaster();
  rc.setFromCamera(new THREE.Vector2(0,0), camera);
  const sp = 0.012;
  rc.ray.direction.x += (Math.random()-0.5)*sp;
  rc.ray.direction.y += (Math.random()-0.5)*sp;
  rc.ray.direction.normalize();

  let bestBot = null, bestDist = Infinity;
  bots.forEach(b => {
    if (!b.alive) return;
    const hits = rc.intersectObjects(b.model.children, true);
    if (hits.length > 0 && hits[0].distance < bestDist) {
      bestDist = hits[0].distance;
      bestBot = { bot: b, pt: hits[0].point, dist: hits[0].distance };
    }
  });

  const bHits = rc.intersectObjects(obstacleMeshes);
  const bDist = bHits.length > 0 ? bHits[0].distance : Infinity;

  if (bestBot && bestDist < bDist) {
    const headshot = bestBot.pt.y > 5.0;
    const dmg = headshot ? 42 : 16 + Math.floor(Math.random()*9);
    bestBot.bot.damage(dmg, true);
    addTrail(camera.position, bestBot.pt);
  } else if (bHits.length > 0) {
    addTrail(camera.position, bHits[0].point);
    // spark
    const sp2 = new THREE.Mesh(new THREE.SphereGeometry(0.12,4,4), new THREE.MeshBasicMaterial({color:0xFFAA00}));
    sp2.position.copy(bHits[0].point); scene.add(sp2);
    setTimeout(() => scene.remove(sp2), 100);
  } else {
    const ep = rc.ray.origin.clone().add(rc.ray.direction.clone().multiplyScalar(200));
    addTrail(camera.position, ep);
  }

  setTimeout(() => canFire = true, FIRE_RATE);
  if (ammo <= 0) doReload();
}

function addTrail(a, b) {
  const geo = new THREE.BufferGeometry().setFromPoints([a.clone(), b.clone()]);
  const mat = new THREE.LineBasicMaterial({ color: 0xFFFF88, transparent: true, opacity: 0.5 });
  const line = new THREE.Line(geo, mat);
  scene.add(line);
  trails.push({ m: line, t: 0.12 });
}

function doReload() {
  if (reloading || ammo === maxAmmo) return;
  reloading = true;
  elReload.style.display = 'block';
  setTimeout(() => {
    ammo = maxAmmo; reloading = false;
    updateAmmo();
    elReload.style.display = 'none';
  }, 1800);
}

function hitMark(headshot) {
  const el = document.getElementById('hitmarker');
  el.style.display = 'block';
  el.querySelectorAll('line').forEach(l => l.setAttribute('stroke', headshot ? '#ff4444' : '#fff'));
  setTimeout(() => el.style.display = 'none', 140);
}

// ════════════════════════════════════════
//  KILL FEED
// ════════════════════════════════════════
const feedItems = [];
function feedKill(killer, victim) {
  const d = document.createElement('div');
  d.className = 'kf-entry';
  d.innerHTML = '<span style="color:' + (killer === 'You' ? '#FFD700' : '#4fc3f7') + '">' + killer + '</span> eliminated <span style="color:#ff6b6b">' + victim + '</span>';
  elFeed.appendChild(d);
  feedItems.push({ el: d, t: 5 });
  while (elFeed.children.length > 6) elFeed.removeChild(elFeed.children[0]);
}

// ════════════════════════════════════════
//  MINIMAP
// ════════════════════════════════════════
const mmCtx = document.getElementById('minimap-c').getContext('2d');
function drawMinimap() {
  const w = 150, cx = 75, cy = 75, sc = 0.38;
  mmCtx.clearRect(0,0,w,w);
  mmCtx.fillStyle = 'rgba(40,60,40,0.7)';
  mmCtx.beginPath(); mmCtx.arc(cx,cy,73,0,Math.PI*2); mmCtx.fill();

  // buildings
  mmCtx.fillStyle = 'rgba(150,150,150,0.5)';
  colliders.forEach(c => {
    const bx = cx + (c.x - camera.position.x)*sc;
    const bz = cy + (c.z - camera.position.z)*sc;
    if (Math.hypot(bx-cx, bz-cy) < 72) {
      mmCtx.fillRect(bx - c.hw*sc, bz - c.hd*sc, c.hw*2*sc, c.hd*2*sc);
    }
  });

  // bots
  bots.forEach(b => {
    if (!b.alive) return;
    const bx = cx + (b.model.position.x - camera.position.x)*sc;
    const bz = cy + (b.model.position.z - camera.position.z)*sc;
    if (Math.hypot(bx-cx, bz-cy) < 70) {
      mmCtx.fillStyle = '#ff4444';
      mmCtx.beginPath(); mmCtx.arc(bx, bz, 3, 0, Math.PI*2); mmCtx.fill();
    }
  });

  // player
  mmCtx.fillStyle = '#44ff44';
  mmCtx.beginPath(); mmCtx.arc(cx, cy, 4, 0, Math.PI*2); mmCtx.fill();
  const dx = Math.sin(yaw)*12, dz = Math.cos(yaw)*12;
  mmCtx.strokeStyle = '#44ff44'; mmCtx.lineWidth = 2;
  mmCtx.beginPath(); mmCtx.moveTo(cx, cy); mmCtx.lineTo(cx - dx, cy - dz); mmCtx.stroke();
}

// ════════════════════════════════════════
//  GAME OVER
// ════════════════════════════════════════
function endGame() {
  over = true;
  document.exitPointerLock();
  const all = [{ n: 'You', k: kills }];
  bots.forEach(b => all.push({ n: b.name, k: b.kills }));
  all.sort((a,b) => b.k - a.k);
  const place = all.findIndex(p => p.n === 'You') + 1;
  const acc = shotsFired > 0 ? Math.round(shotsHit / shotsFired * 100) : 0;

  document.getElementById('go-title').textContent = place === 1 ? 'VICTORY ROYALE!' : '#' + place + ' Place';
  document.getElementById('go-title').style.color = place === 1 ? '#FFD700' : place <= 3 ? '#C0C0C0' : '#fff';
  document.getElementById('go-kills').textContent = 'Kills: ' + kills;
  document.getElementById('go-deaths').textContent = 'Deaths: ' + deaths;
  document.getElementById('go-acc').textContent = 'Accuracy: ' + acc + '%';
  document.getElementById('gameover').style.display = 'flex';
}

// ════════════════════════════════════════
//  DOM REFS
// ════════════════════════════════════════
const elHPbar = document.getElementById('hp-bar');
const elHPtxt = document.getElementById('hp-label');
const elAmmoNum = document.getElementById('ammo-num');
const elKills = document.getElementById('kills-display');
const elTimer = document.getElementById('timer-display');
const elAlive = document.getElementById('alive-display');
const elFeed = document.getElementById('kill-feed');
const elDmg = document.getElementById('dmg-flash');
const elReload = document.getElementById('reload-msg');
const elPause = document.getElementById('pause-msg');

// ════════════════════════════════════════
//  INPUT
// ════════════════════════════════════════
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'KeyR' && started && !over) doReload();
});
document.addEventListener('keyup', e => keys[e.code] = false);

let mouseHeld = false;
let autoFire = null;
document.addEventListener('mousedown', e => {
  if (e.button !== 0 || !started || over || paused) return;
  if (document.pointerLockElement !== renderer.domElement) return;
  mouseHeld = true;
  playerShoot();
  if (autoFire) clearInterval(autoFire);
  autoFire = setInterval(() => { if (mouseHeld && started && !over && !paused) playerShoot(); }, FIRE_RATE + 15);
});
document.addEventListener('mouseup', e => {
  if (e.button === 0) { mouseHeld = false; if (autoFire) { clearInterval(autoFire); autoFire = null; } }
});

document.addEventListener('mousemove', e => {
  if (!started || over || paused) return;
  if (document.pointerLockElement !== renderer.domElement) return;
  yaw -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;
  pitch = Math.max(-1.5, Math.min(1.5, pitch));
  camera.rotation.order = 'YXZ';
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;
});

document.addEventListener('pointerlockchange', () => {
  if (started && !over) {
    if (document.pointerLockElement !== renderer.domElement) {
      paused = true;
      elPause.style.display = 'block';
    } else {
      paused = false;
      elPause.style.display = 'none';
    }
  }
});

document.addEventListener('contextmenu', e => e.preventDefault());

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ════════════════════════════════════════
//  START
// ════════════════════════════════════════
document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('menu').style.display = 'none';
  document.getElementById('hud').style.display = 'block';
  started = true;

  const sp = spawnPt();
  camera.position.set(sp.x, PLAYER_H, sp.z);

  // Request pointer lock on the canvas after a tiny delay
  setTimeout(() => {
    renderer.domElement.requestPointerLock();
  }, 100);

  refreshAlive();
  updateAmmo();
  updateHP();
  lastTime = performance.now();
  requestAnimationFrame(loop);
});

// Also re-lock on canvas click
renderer.domElement.addEventListener('click', () => {
  if (started && !over) {
    renderer.domElement.requestPointerLock();
  }
});

// ════════════════════════════════════════
//  GAME LOOP
// ════════════════════════════════════════
let lastTime = 0;

function loop(now) {
  requestAnimationFrame(loop);
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;

  if (over) { renderer.render(scene, camera); return; }
  if (paused) { renderer.render(scene, camera); return; }

  // timer
  timeLeft -= dt;
  if (timeLeft <= 0) { timeLeft = 0; endGame(); return; }
  const mm = Math.floor(timeLeft / 60);
  const ss = Math.floor(timeLeft % 60);
  elTimer.textContent = mm + ':' + String(ss).padStart(2, '0');
  elTimer.style.color = timeLeft <= 30 ? '#ff4444' : '#fff';

  // player movement
  const fwd = new THREE.Vector3(0, 0, -1);
  fwd.applyQuaternion(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), yaw));
  const right = new THREE.Vector3(1, 0, 0);
  right.applyQuaternion(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), yaw));

  let mx = 0, mz = 0;
  if (keys['KeyW']) { mx += fwd.x; mz += fwd.z; }
  if (keys['KeyS']) { mx -= fwd.x; mz -= fwd.z; }
  if (keys['KeyA']) { mx -= right.x; mz -= right.z; }
  if (keys['KeyD']) { mx += right.x; mz += right.z; }
  const ml = Math.sqrt(mx*mx + mz*mz);
  if (ml > 0) {
    mx /= ml; mz /= ml;
    const nx = camera.position.x + mx * PLAYER_SPEED * dt;
    const nz = camera.position.z + mz * PLAYER_SPEED * dt;
    if (!playerCollides(nx, nz)) { camera.position.x = nx; camera.position.z = nz; }
    else if (!playerCollides(nx, camera.position.z)) camera.position.x = nx;
    else if (!playerCollides(camera.position.x, nz)) camera.position.z = nz;
  }
  camera.position.x = Math.max(-MAP_SIZE+2, Math.min(MAP_SIZE-2, camera.position.x));
  camera.position.z = Math.max(-MAP_SIZE+2, Math.min(MAP_SIZE-2, camera.position.z));

  // jump
  if (keys['Space'] && grounded) { velY = JUMP_V; grounded = false; }
  velY += GRAVITY * dt;
  camera.position.y += velY * dt;
  if (camera.position.y <= PLAYER_H) { camera.position.y = PLAYER_H; velY = 0; grounded = true; }

  // weapon bob
  if (ml > 0 && grounded) {
    wpn.position.y = -0.32 + Math.sin(now * 0.008) * 0.018;
    wpn.position.x = 0.32 + Math.cos(now * 0.004) * 0.008;
  }

  // AI
  bots.forEach(b => b.update(dt));

  // trails
  for (let i = trails.length - 1; i >= 0; i--) {
    trails[i].t -= dt;
    if (trails[i].t <= 0) { scene.remove(trails[i].m); trails.splice(i,1); }
  }

  // feed
  for (let i = feedItems.length - 1; i >= 0; i--) {
    feedItems[i].t -= dt;
    if (feedItems[i].t <= 0) {
      if (feedItems[i].el.parentNode) feedItems[i].el.parentNode.removeChild(feedItems[i].el);
      feedItems.splice(i, 1);
    }
  }

  // hp regen
  if (hp < maxHp) { hp = Math.min(maxHp, hp + 1.5 * dt); updateHP(); }

  drawMinimap();
  renderer.render(scene, camera);
}

// Initial render so it's not black
renderer.render(scene, camera);
</script>
</body>
