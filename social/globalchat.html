<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Chat</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000000;--surf:#0a0a0a;--raise:#111111;--raise2:#181818;
  --bdr:#222222;--bdrhi:#333333;--muted:#111111;--dim:#555555;
  --text:#cccccc;--bright:#eeeeee;--white:#ffffff;
  --accent:#58a6ff;--danger:#f85149;--success:#56d364;--r:10px;
}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;}

/* ── HEADER ── */
.chat-header{display:flex;align-items:center;gap:10px;padding:11px 16px;background:var(--surf);border-bottom:1px solid var(--bdr);flex-shrink:0;}
.header-icon{width:28px;height:28px;flex-shrink:0;color:var(--accent)}
.header-icon svg{width:100%;height:100%}
.header-info{flex:1;min-width:0}
.header-title{font-weight:700;font-size:.95rem;color:var(--bright);line-height:1.2}
.header-sub{font-size:.7rem;color:var(--dim);margin-top:1px}
.online-badge{display:flex;align-items:center;gap:5px;background:var(--raise);border:1px solid var(--bdr);border-radius:20px;padding:3px 9px;flex-shrink:0;}
.online-dot{width:7px;height:7px;border-radius:50%;background:var(--success);box-shadow:0 0 5px var(--success)}
#onlineCount{font-size:.7rem;color:var(--dim)}

/* ── MESSAGES AREA ── */
.chat-body{flex:1;overflow-y:auto;padding:10px 0 6px;display:flex;flex-direction:column;position:relative;min-height:0;}
.chat-body::-webkit-scrollbar{width:5px}
.chat-body::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}
.chat-body::-webkit-scrollbar-track{background:transparent}

.date-sep{display:flex;align-items:center;gap:10px;padding:10px 16px;color:var(--dim);font-size:.68rem;letter-spacing:.04em;text-transform:uppercase;}
.date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:var(--bdr)}

/* Message row – others */
.msg-row{display:flex;align-items:flex-start;gap:9px;padding:2px 14px;position:relative;}
/* Message row – own (right-aligned) */
.msg-row.own{flex-direction:row-reverse}
.msg-row.own .msg-col{align-items:flex-end}
.msg-row.own .msg-meta{flex-direction:row-reverse}
.msg-row.own .msg-bubble{background:var(--accent);border-color:transparent;border-radius:18px 4px 18px 18px;}
.msg-row.own .msg-text{color:#fff}
.msg-row.own .msg-reply-bar{border-left:none;border-right:3px solid rgba(255,255,255,.4);padding:3px 7px 3px 6px;text-align:right;flex-direction:row-reverse}
.msg-row.own .msg-reply-name{color:rgba(255,255,255,.75)}
.msg-row.own .reactions-row{justify-content:flex-end}
.msg-row.own .dots-btn{left:14px;right:auto}
.msg-row.highlighted{background:rgba(88,166,255,.08)!important;border-radius:6px}

/* Avatar */
.msg-avatar{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.82rem;color:#fff;background-size:cover;background-position:center;margin-top:2px;}
.msg-row.own .msg-avatar{display:none}

/* Column */
.msg-col{display:flex;flex-direction:column;max-width:min(480px,74%);min-width:0;}

/* Meta */
.msg-meta{display:flex;align-items:baseline;gap:6px;margin-bottom:3px;padding:0 2px;}
.msg-name{font-weight:600;font-size:.8rem;color:var(--bright);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.msg-time{font-size:.63rem;color:var(--dim);flex-shrink:0}

/* Bubble */
.msg-bubble{background:var(--raise);border:1px solid var(--bdr);border-radius:4px 18px 18px 18px;padding:8px 12px;word-break:break-word;}

/* Reply preview inside bubble */
.msg-reply-bar{display:flex;align-items:flex-start;gap:5px;border-left:3px solid rgba(88,166,255,.5);padding:3px 7px 3px 6px;margin-bottom:6px;border-radius:0 4px 4px 0;background:rgba(0,0,0,.15);cursor:pointer;font-size:.72rem;}
.msg-reply-bar:hover{background:rgba(0,0,0,.25)}
.msg-reply-name{color:var(--accent);font-weight:600;flex-shrink:0;white-space:nowrap}
.msg-reply-text{color:var(--dim);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}

.msg-text{font-size:.875rem;line-height:1.5;white-space:pre-wrap;color:var(--text)}

/* Media */
.msg-img,.msg-gif{max-width:280px;max-height:240px;border-radius:10px;margin-top:5px;cursor:pointer;border:1px solid var(--bdr);display:block;transition:opacity .14s;}
.msg-img{object-fit:cover}
.msg-gif{max-height:none;object-fit:fill}
.msg-img:hover,.msg-gif:hover{opacity:.85}

/* Reactions */
.reactions-row{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;padding:0 2px;}
.reaction-pill{display:inline-flex;align-items:center;gap:3px;background:var(--raise2);border:1px solid var(--bdr);border-radius:20px;padding:2px 7px;font-size:.78rem;cursor:pointer;transition:all .12s;user-select:none;line-height:1.4;}
.reaction-pill:hover{background:var(--muted);border-color:var(--bdrhi)}
.reaction-pill.reacted{background:rgba(88,166,255,.14);border-color:rgba(88,166,255,.45);color:var(--accent)}
.reaction-pill .rc{font-size:.68rem;color:var(--dim)}

/* ── THREE-DOTS MENU ── */
/* Wrap sits inline next to the bubble, fades in on row hover */
.dots-wrap{
  position:relative;flex-shrink:0;
  display:flex;align-items:flex-start;
  padding-top:22px; /* push button down to align with bubble top */
  opacity:0;transition:opacity .12s;
}
.msg-row:hover .dots-wrap{opacity:1}

.dots-btn{
  background:var(--surf);border:1px solid var(--bdr);
  border-radius:7px;width:26px;height:24px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--dim);transition:all .12s;flex-shrink:0;
}
.dots-btn:hover{color:var(--bright);background:var(--raise2)}
.dots-btn svg{width:14px;height:14px}

/* Dropdown anchored to the wrap */
.msg-dropdown{
  position:absolute;left:0;top:calc(22px + 28px + 4px);
  background:var(--surf);border:1px solid var(--bdr);
  border-radius:10px;padding:4px;z-index:30;
  box-shadow:0 6px 20px rgba(0,0,0,.55);
  min-width:140px;display:none;flex-direction:column;gap:1px;
  white-space:nowrap;
}
/* Own messages: row is reversed so wrap is on left side — open dropdown to the right */
.msg-row.own .msg-dropdown{left:auto;right:0}
.msg-dropdown.open{display:flex}
.dd-item{
  display:flex;align-items:center;gap:8px;
  padding:7px 10px;border-radius:6px;cursor:pointer;
  font-size:.8rem;color:var(--text);transition:background .1s;
  border:none;background:none;width:100%;text-align:left;
}
.dd-item svg{width:14px;height:14px;flex-shrink:0;color:var(--dim)}
.dd-item:hover{background:var(--raise2)}
.dd-item:hover svg{color:var(--text)}
.dd-item.danger{color:var(--danger)}
.dd-item.danger svg{color:var(--danger)}
.dd-item.danger:hover{background:rgba(248,81,73,.1)}

/* React floater anchored to the wrap */
.react-floater{
  position:absolute;left:0;top:calc(22px + 28px + 4px);
  background:var(--surf);border:1px solid var(--bdr);
  border-radius:10px;padding:5px;display:none;
  gap:2px;flex-wrap:wrap;width:192px;
  box-shadow:0 6px 20px rgba(0,0,0,.55);z-index:30;
}
.msg-row.own .react-floater{left:auto;right:0}
.rq-btn{background:none;border:none;cursor:pointer;font-size:1.15rem;padding:4px;border-radius:5px;transition:background .1s;line-height:1;}
.rq-btn:hover{background:var(--raise2)}

/* Scroll helpers */
.scroll-btn{
  position:absolute;bottom:10px;right:16px;
  background:var(--raise2);border:1px solid var(--bdrhi);color:var(--text);
  border-radius:50%;width:32px;height:32px;font-size:.95rem;cursor:pointer;
  display:none;align-items:center;justify-content:center;
  box-shadow:0 3px 10px rgba(0,0,0,.45);transition:all .14s;z-index:5;
}
.scroll-btn.on{display:flex}
.scroll-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.new-pill{position:absolute;bottom:50px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;border:none;border-radius:20px;padding:4px 14px;font-size:.75rem;cursor:pointer;display:none;box-shadow:0 3px 12px rgba(0,0,0,.45);z-index:5;white-space:nowrap;}
.new-pill.on{display:block}

/* Loading */
.load-row{display:flex;align-items:center;justify-content:center;gap:10px;padding:40px;color:var(--dim);font-size:.82rem;}
.spin{width:16px;height:16px;border:2px solid var(--bdr);border-top-color:var(--accent);border-radius:50%;animation:_s .65s linear infinite;}
@keyframes _s{to{transform:rotate(360deg)}}

/* ── INPUT AREA ── */
.chat-foot{flex-shrink:0;background:var(--surf);border-top:1px solid var(--bdr);padding:8px 12px 10px;}

/* Panels */
.panel{background:var(--raise);border:1px solid var(--bdr);border-radius:12px;margin-bottom:8px;display:none;flex-direction:column;}
.panel.open{display:flex}

/* Emoji panel */
.ep-inner{padding:8px;display:flex;flex-direction:column;gap:6px;}
.p-search{background:var(--raise2);border:1px solid var(--bdr);border-radius:7px;padding:6px 10px;color:var(--text);font-size:.8rem;outline:none;width:100%;font-family:inherit;}
.p-search::placeholder{color:var(--dim)}
.ecats{display:flex;gap:3px;overflow-x:auto;padding-bottom:2px;}
.ecats::-webkit-scrollbar{height:3px}
.ecats::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}
.ecat{background:none;border:none;cursor:pointer;font-size:.95rem;padding:4px 6px;border-radius:6px;color:var(--dim);flex-shrink:0;transition:background .1s;}
.ecat:hover,.ecat.on{background:var(--raise2)}
.egrid{display:grid;grid-template-columns:repeat(9,1fr);gap:1px;max-height:160px;overflow-y:auto;}
.egrid::-webkit-scrollbar{width:4px}
.egrid::-webkit-scrollbar-thumb{background:var(--bdr)}
.ebtn{background:none;border:none;cursor:pointer;font-size:1.15rem;padding:4px;border-radius:4px;text-align:center;transition:background .1s;}
.ebtn:hover{background:var(--raise2)}

/* GIF panel */
.gp-inner{padding:8px;display:flex;flex-direction:column;gap:6px;height:268px;}
.ggrid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-auto-rows:72px;   /* fixed row height – prevents rows stretching */
  align-content:start;   /* pack rows to top, don't stretch */
  gap:5px;overflow-y:auto;flex:1;min-height:0;
}
.ggrid::-webkit-scrollbar{width:4px}
.ggrid::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}
.gif-item{border-radius:7px;overflow:hidden;cursor:pointer;background:#111;height:72px;transition:opacity .12s;}
.gif-item:hover{opacity:.8}
.gif-item img{width:100%;height:100%;object-fit:contain;display:block}
.gif-empty{text-align:center;color:var(--dim);font-size:.78rem;padding:20px 0;grid-column:1/-1}

/* Reply / image bars */
.above-bar{display:none;align-items:center;gap:8px;border-radius:7px;padding:5px 10px;margin-bottom:6px;font-size:.78rem;}
.above-bar.on{display:flex}
.reply-above{background:var(--raise);border-left:3px solid var(--accent)}
.img-above{background:var(--raise);border:1px solid var(--bdr)}
.bar-label{flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;color:var(--dim)}
.bar-name{color:var(--accent);font-weight:600}
.bar-close{background:none;border:none;cursor:pointer;color:var(--dim);font-size:.9rem;padding:2px 4px;flex-shrink:0;transition:color .12s;}
.bar-close:hover{color:var(--danger)}
.img-thumb{width:32px;height:32px;object-fit:cover;border-radius:4px;flex-shrink:0}

/* Input row */
.input-row{display:flex;align-items:flex-end;gap:7px}
.tool-btn{
  background:var(--raise);border:1px solid var(--bdr);
  border-radius:8px;cursor:pointer;padding:0;
  width:38px;height:38px;color:var(--dim);transition:all .12s;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
}
.tool-btn svg{width:17px;height:17px}
.tool-btn:hover{background:var(--raise2);border-color:var(--bdrhi);color:var(--text)}
.tool-btn.on{color:var(--accent);border-color:rgba(88,166,255,.4);background:rgba(88,166,255,.08)}
.gif-lbl{font-size:.75rem;font-weight:700;letter-spacing:.03em}

#msgInput{flex:1;background:var(--raise);border:1px solid var(--bdr);border-radius:10px;padding:9px 12px;color:var(--text);font-size:.875rem;resize:none;min-height:40px;max-height:110px;font-family:inherit;line-height:1.5;outline:none;overflow-y:auto;transition:border-color .12s;}
#msgInput:focus{border-color:var(--bdrhi)}
#msgInput::placeholder{color:var(--dim)}
.send-btn{background:var(--accent);border:none;border-radius:10px;width:40px;height:40px;color:#fff;cursor:pointer;flex-shrink:0;transition:all .12s;display:flex;align-items:center;justify-content:center;}
.send-btn svg{width:17px;height:17px}
.send-btn:hover{filter:brightness(1.15)}
.send-btn:disabled{opacity:.35;cursor:not-allowed}

/* Lightbox */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:1000;align-items:center;justify-content:center;cursor:zoom-out;}
.lightbox.on{display:flex}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:8px;object-fit:contain;cursor:default}

/* ── VEXIS AI MESSAGES ── */
.msg-row.vexis-ai .msg-bubble{
  background:linear-gradient(135deg,rgba(88,166,255,.12),rgba(130,100,255,.1));
  border-color:rgba(88,166,255,.35);border-radius:4px 18px 18px 18px;
}
.vexis-badge{
  display:inline-flex;align-items:center;gap:4px;
  font-size:.55rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  background:rgba(88,166,255,.15);border:1px solid rgba(88,166,255,.35);
  color:var(--accent);border-radius:4px;padding:1px 6px;margin-left:6px;
}
.vexis-typing{display:flex;gap:4px;align-items:center;padding:4px 2px}
.vexis-typing span{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:vt .9s ease-in-out infinite}
.vexis-typing span:nth-child(2){animation-delay:.15s}
.vexis-typing span:nth-child(3){animation-delay:.3s}
@keyframes vt{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}

/* ── INLINE REPORT BUTTON ── */
.report-btn-inline{
  background:none;border:none;cursor:pointer;padding:3px 5px;border-radius:5px;
  color:var(--dim);opacity:0;transition:all .12s;flex-shrink:0;font-size:.85rem;
  display:flex;align-items:center;
}
.msg-row:hover .report-btn-inline{opacity:.6}
.report-btn-inline:hover{opacity:1!important;background:rgba(248,81,73,.1);color:var(--danger)}

/* Toast */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(6px);background:var(--raise2);border:1px solid var(--bdr);color:var(--bright);padding:7px 15px;border-radius:8px;font-size:.78rem;pointer-events:none;opacity:0;transition:all .25s;z-index:2000;white-space:nowrap;box-shadow:0 4px 14px rgba(0,0,0,.5);}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── PROFILE MODAL ── */
.prof-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:600;display:none;align-items:center;justify-content:center;padding:16px;}
.prof-overlay.open{display:flex;}
.prof-modal{background:var(--surf);border:1px solid var(--bdrhi);border-radius:14px;width:290px;max-width:100%;overflow:hidden;position:relative;animation:_pu .18s ease;}
@keyframes _pu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.prof-banner{height:58px;background:linear-gradient(135deg,#0d1f35,#0a1520);}
.prof-body{padding:0 16px 16px;position:relative;}
.prof-av{width:52px;height:52px;border-radius:50%;border:3px solid var(--surf);overflow:hidden;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.1rem;color:#fff;margin-top:-26px;margin-bottom:4px;}
.prof-av img{width:100%;height:100%;object-fit:cover;display:block;}
.prof-name{font-size:.93rem;font-weight:700;color:var(--bright);}
.prof-cstatus{font-size:.7rem;color:var(--dim);margin-top:2px;}
.prof-bio{font-size:.76rem;color:var(--text);margin-top:8px;padding-top:8px;border-top:1px solid var(--bdr);line-height:1.5;}
.prof-role{display:inline-flex;align-items:center;gap:4px;margin-top:6px;padding:2px 8px;border-radius:20px;font-size:.63rem;font-weight:700;}
.prof-role.user{background:rgba(90,90,90,.18);color:#777;border:1px solid #2a2a2a}
.prof-role.moderator{background:rgba(88,166,255,.1);color:var(--accent);border:1px solid rgba(88,166,255,.22)}
.prof-role.owner,.prof-role.main_owner{background:rgba(227,179,65,.1);color:#e3b341;border:1px solid rgba(227,179,65,.22)}
.prof-role.banned{background:rgba(248,81,73,.1);color:var(--danger);border:1px solid rgba(248,81,73,.22)}
.prof-actions{display:flex;gap:6px;margin-top:12px;}
.prof-btn{flex:1;padding:7px 8px;border-radius:8px;border:1px solid var(--bdrhi);background:var(--raise);color:var(--text);font-size:.74rem;font-weight:600;cursor:pointer;transition:all .14s;text-align:center;}
.prof-btn:hover{background:var(--raise2);color:var(--bright);}
.prof-btn.added{color:var(--success);border-color:rgba(86,211,100,.25);pointer-events:none;}
.prof-btn.pending{color:var(--dim);cursor:default;pointer-events:none;}
.prof-close{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.5);border:none;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#aaa;font-size:.75rem;z-index:1;}
.prof-edit-row{display:flex;flex-direction:column;gap:6px;margin-top:10px;}
.prof-edit-input{background:var(--raise);border:1px solid var(--bdr);border-radius:7px;padding:6px 9px;color:var(--bright);font-size:.78rem;font-family:inherit;outline:none;width:100%;}
.prof-edit-input:focus{border-color:var(--accent);}
.prof-edit-input::placeholder{color:var(--dim);}

/* ── EDIT MODE ── */
.edit-area{width:100%;background:transparent;border:none;border-bottom:1.5px solid var(--accent);color:inherit;font-size:.875rem;line-height:1.5;font-family:inherit;resize:none;outline:none;padding:2px 0;min-height:22px;}
.msg-edited{font-size:.58rem;color:var(--dim);margin-left:4px;vertical-align:middle;}

/* ── VIEW COUNT ── */
.msg-views{font-size:.6rem;color:var(--dim);margin-top:3px;display:flex;align-items:center;gap:3px;}

/* ── MENTIONS ── */
.mention{color:var(--accent);font-weight:600;background:rgba(88,166,255,.1);border-radius:3px;padding:0 2px;}
.mention-drop{background:var(--raise2);border:1px solid var(--bdrhi);border-radius:8px;overflow:hidden;display:none;max-height:140px;overflow-y:auto;margin-bottom:5px;}
.mention-drop.open{display:block;}
.mention-item{display:flex;align-items:center;gap:8px;padding:6px 10px;cursor:pointer;font-size:.8rem;}
.mention-item:hover,.mention-item.sel{background:var(--raise);}
.mention-av-sm{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.55rem;font-weight:700;color:#fff;flex-shrink:0;}
.mention-name{color:var(--bright);font-weight:500;}
.cmd-drop{background:var(--raise2);border:1px solid var(--bdrhi);border-radius:8px;overflow:hidden;display:none;margin-bottom:5px;}
.cmd-drop.open{display:block;}
.cmd-item{display:flex;align-items:center;gap:10px;padding:8px 12px;cursor:pointer;transition:background .1s;}
.cmd-item:hover,.cmd-item.sel{background:var(--raise);}
.cmd-icon{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,rgba(88,166,255,.2),rgba(130,100,255,.2));border:1px solid rgba(88,166,255,.3);display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;}
.cmd-name{font-size:.82rem;font-weight:700;color:var(--accent);}
.cmd-desc{font-size:.68rem;color:var(--dim);margin-top:1px;}

/* chat-foot needs relative so mention drop positions */
.chat-foot{position:relative;}
</style>
</head>
<body>

<!-- HEADER -->
<div class="chat-header">
  <div class="header-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
  </div>
  <div class="header-info">
    <div class="header-title">Global Chat</div>
    <div class="header-sub">Talk with everyone on Vexissunset</div>
  </div>
  <div class="online-badge">
    <div class="online-dot"></div>
    <span id="onlineCount">…</span>
  </div>
</div>

<!-- MESSAGES -->
<div class="chat-body" id="chatBody">

// ── /VEXIS AI ─────────────────────────────────────────────────────────────────
const _vexisHistory=[];

async function vexisChat(query, replyContext=null){
  if(!me||me.isGuest){toast('Sign in to use Vexis AI');return;}
  // Build messages array with memory
  const messages=[..._vexisHistory];
  if(replyContext) messages.push({role:'assistant',content:replyContext});
  messages.push({role:'user',content:query});

  // Show typing indicator
  const typingId='vtyping-'+Date.now();
  const typingRow=document.createElement('div');
  typingRow.id=typingId;typingRow.className='msg-row vexis-ai';
  const typingAv=document.createElement('div');typingAv.className='msg-avatar';
  typingAv.style.cssText='background:linear-gradient(135deg,#3b82f6,#8b5cf6);font-size:.7rem';typingAv.textContent='✦';
  const typingCol=document.createElement('div');typingCol.className='msg-col';
  const typingMeta=document.createElement('div');typingMeta.className='msg-meta';
  typingMeta.innerHTML='<span class="msg-name" style="color:var(--accent)">Vexis AI</span><span class="vexis-badge">AI</span>';
  const typingBubble=document.createElement('div');typingBubble.className='msg-bubble';
  typingBubble.innerHTML='<div class="vexis-typing"><span></span><span></span><span></span></div>';
  typingCol.append(typingMeta,typingBubble);typingRow.append(typingAv,typingCol);
  chatBody.insertBefore(typingRow,document.getElementById('scrollBtn'));
  scrollToBottom();

  try{
    const res=await fetch('https://vexis-ai.stievercaden.workers.dev/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages})});
    const data=await res.json();
    const reply=data.message||data.content||data.choices?.[0]?.message?.content||'Sorry, I couldn\'t respond right now.';

    // Update session memory
    _vexisHistory.push({role:'user',content:query});
    _vexisHistory.push({role:'assistant',content:reply});
    if(_vexisHistory.length>40) _vexisHistory.splice(0,2); // keep last 20 exchanges

    // Remove typing indicator
    typingRow.remove();

    // Post AI reply to Firestore so everyone sees it
    await db.collection(COL).add({
      text:reply,userId:'vexis-ai',displayName:'Vexis AI',
      photoURL:null,timestamp:FS.FieldValue.serverTimestamp(),
      reactions:{},replyTo:null,gifUrl:null,imageBase64:null,
      isVexisAI:true,
    });
  }catch(e){
    typingRow.remove();
    toast('Vexis AI failed to respond');
  }
}

async function sendMsg(gifUrl){
  const text=msgInput.value.trim();
  if(!text&&!pendingImg&&!gifUrl) return;
  if(!me){toast('Not signed in');return;}

  // Rate limiting
  const now=Date.now();
  if(!gifUrl&&!pendingImg){
    if(now-_lastSent<MSG_COOLDOWN){toast(`Slow down — wait ${Math.ceil((MSG_COOLDOWN-(now-_lastSent))/1000)}s`);return;}
    if(text&&text===_lastText){toast('No duplicate messages');return;}
  }

  // /vexis command
  if(text.toLowerCase().startsWith('/vexis ')||text.toLowerCase()==='/vexis'){
    const query=text.slice(7).trim();
    if(!query){toast('Usage: /vexis [your message]');return;}
    msgInput.value='';resizeTA(msgInput);
    // Post user query to chat visibly
    const replyCtx=replyTarget?.text||null;
    await db.collection(COL).add({
      text:`/vexis ${query}`,userId:me.uid,displayName:me.displayName||'Anonymous',
      photoURL:me.photoURL||null,timestamp:FS.FieldValue.serverTimestamp(),
      reactions:{},replyTo:replyTarget?{id:replyTarget.id,text:replyTarget.text,displayName:replyTarget.displayName}:null,
      gifUrl:null,imageBase64:null,
    });
    clearReply();scrollToBottom();
    vexisChat(query,replyCtx);
    return;
  }

  // Reply to a Vexis AI message → continue the conversation
  if(replyTarget&&text&&!gifUrl&&!pendingImg){
    const parentEl=document.getElementById('m-'+replyTarget.id);
    if(parentEl&&parentEl.classList.contains('vexis-ai')){
      msgInput.value='';resizeTA(msgInput);
      await db.collection(COL).add({
        text,userId:me.uid,displayName:me.displayName||'Anonymous',
        photoURL:me.photoURL||null,timestamp:FS.FieldValue.serverTimestamp(),
        reactions:{},replyTo:{id:replyTarget.id,text:replyTarget.text,displayName:replyTarget.displayName},
        gifUrl:null,imageBase64:null,
      });
      clearReply();scrollToBottom();
      vexisChat(text, replyTarget.text);
      return;
    }
  }

  // Auto-mod check
  if(text&&_gcAutomodWords.length){
    const lc=text.toLowerCase();
    const hit=_gcAutomodWords.find(w=>lc.includes(w));
    if(hit){toast('Your message contains a blocked word.');return;}
  }

  _lastSent=now; if(text) _lastText=text;
  sendBtn.disabled=true;
  const payload={
    text:text||null,userId:me.uid,displayName:me.displayName||'Anonymous',
    photoURL:me.photoURL||null,timestamp:FS.FieldValue.serverTimestamp(),
    reactions:{},replyTo:replyTarget?{id:replyTarget.id,text:replyTarget.text,displayName:replyTarget.displayName}:null,
    gifUrl:gifUrl||null,imageBase64:pendingImg||null,
  };
  try{
    await db.collection(COL).add(payload);
    msgInput.value='';resizeTA(msgInput);clearReply();clearImage();closeAllPanels();scrollToBottom(true);
  }catch(err){toast('Failed to send');console.error(err);}
  finally{sendBtn.disabled=false;msgInput.focus();}
}

const chatBody=document.getElementById('chatBody');

function listenMsgs(){
  // Mark global chat as read when user opens it
  localStorage.setItem('vexis-gc-read', Date.now().toString());
  if(unsub) unsub();
  unsub=db.collection(COL).orderBy('timestamp','asc').limitToLast(LIMIT).onSnapshot(snap=>{
    document.getElementById('loadRow').style.display='none';
    const changes=snap.docChanges();
    changes.forEach(ch=>{
      if(ch.type==='added')           addMsgEl(ch.doc.id,ch.doc.data());
      else if(ch.type==='modified')   updateMsgEl(ch.doc.id,ch.doc.data());
      else if(ch.type==='removed'){   const el=document.getElementById('m-'+ch.doc.id);if(el)el.remove();}
    });
    if(atBottom) scrollToBottom();
    else if(changes.some(c=>c.type==='added')){newCount++;updateNewPill();}
  });
}

function addMsgEl(id,data){
  if(document.getElementById('m-'+id)){updateMsgEl(id,data);return;}
  const isOwn=data.userId===me?.uid;
  const anchor=document.getElementById('scrollBtn');

  // Date separator – use querySelectorAll().pop() so :last-of-type doesn't mislead
  if(data.timestamp){
    const d=data.timestamp.toDate?data.timestamp.toDate():new Date(data.timestamp);
    const dk=d.toDateString();
    const seps=[...chatBody.querySelectorAll('.date-sep')];
    const lastSep=seps.length?seps[seps.length-1]:null;
    if(!lastSep||lastSep.dataset.d!==dk){
      const sep=document.createElement('div');
      sep.className='date-sep';sep.dataset.d=dk;sep.textContent=fmtDate(d);
      chatBody.insertBefore(sep,anchor);
    }
  }

  const row=document.createElement('div');
  row.id='m-'+id; row.className='msg-row'+(isOwn?' own':'')+(data.isOfficial?' official-msg':'')+(data.isVexisAI?' vexis-ai':'');
  if(data.isOfficial) row.style.cssText+='background:rgba(255,180,40,.05);border-radius:8px;border:1px solid rgba(255,180,40,.18);margin:6px 14px;padding:4px 2px;';

  // Avatar (others only)
  if(!isOwn){
    const av=document.createElement('div'); av.className='msg-avatar';
    if(data.isVexisAI){av.style.cssText='background:linear-gradient(135deg,#3b82f6,#8b5cf6);font-size:.7rem';av.textContent='✦';}
    else if(data.isOfficial){av.style.background='rgba(255,180,40,.2)';av.style.color='#ffb840';av.textContent='✦';}
    else if(data.photoURL){av.style.backgroundImage=`url('${data.photoURL}')`;av.style.color='transparent';}
    else{av.textContent=(data.displayName||'?')[0].toUpperCase();av.style.background=strColor(data.userId||'');}
    if(!data.isVexisAI&&!data.isOfficial){av.style.cursor='pointer';av.onclick=()=>openProfile(data.userId,data);}
    row.appendChild(av);
  }

  // Column
  const col=document.createElement('div'); col.className='msg-col';

  // Meta row
  const meta=document.createElement('div'); meta.className='msg-meta';
  if(!isOwn){
    const nm=document.createElement('span');nm.className='msg-name';nm.textContent=data.displayName||'Anonymous';
    if(data.isVexisAI) nm.style.color='var(--accent)';
    else if(data.isOfficial) nm.style.color='#ffb840';
    else{nm.style.cursor='pointer';nm.onclick=()=>openProfile(data.userId,data);}
    meta.appendChild(nm);
    if(data.isVexisAI){const badge=document.createElement('span');badge.className='vexis-badge';badge.textContent='AI';meta.appendChild(badge);}
    else if(data.isOfficial){const badge=document.createElement('span');badge.textContent='OFFICIAL';badge.style.cssText='font-size:.55rem;font-weight:700;background:rgba(255,180,40,.15);border:1px solid rgba(255,180,40,.3);color:#ffb840;border-radius:4px;padding:1px 5px;margin-left:5px;letter-spacing:.06em;';meta.appendChild(badge);}
  }
  const tm=document.createElement('span');tm.className='msg-time';
  if(data.timestamp){const d=data.timestamp.toDate?data.timestamp.toDate():new Date(data.timestamp);tm.textContent=fmtTime(d);}
  meta.appendChild(tm);
  col.appendChild(meta);

  // Bubble
  const bubble=document.createElement('div'); bubble.className='msg-bubble';

  if(data.replyTo){
    const rp=document.createElement('div');rp.className='msg-reply-bar';
    const rn=document.createElement('span');rn.className='msg-reply-name';rn.textContent=data.replyTo.displayName||'';
    const rt=document.createElement('span');rt.className='msg-reply-text';rt.textContent=(data.replyTo.text||'[image]').slice(0,60);
    rp.append(rn,rt);
    rp.onclick=()=>{
      const t=document.getElementById('m-'+data.replyTo.id);
      if(t){t.scrollIntoView({behavior:'smooth',block:'center'});t.classList.add('highlighted');setTimeout(()=>t.classList.remove('highlighted'),1400);}
    };
    bubble.appendChild(rp);
  }

  if(data.text){const t=document.createElement('div');t.className='msg-text';t.innerHTML=renderMentionText(data.text)+(data.edited?'<span class="msg-edited">(edited)</span>':'');bubble.appendChild(t);}
  if(data.gifUrl){const i=document.createElement('img');i.className='msg-gif';i.src=data.gifUrl;i.loading='lazy';i.onclick=()=>openLightbox(data.gifUrl);bubble.appendChild(i);}
  if(data.imageBase64){const i=document.createElement('img');i.className='msg-img';i.src=data.imageBase64;i.loading='lazy';i.onclick=()=>openLightbox(data.imageBase64);bubble.appendChild(i);}
  col.appendChild(bubble);

  // Reactions row
  const rr=document.createElement('div');rr.className='reactions-row';rr.id='rr-'+id;
  buildReactions(rr,id,data.reactions||{});col.appendChild(rr);

  // View count (own messages only)
  if(isOwn){
    const vc=document.createElement('div');vc.className='msg-views';vc.id='vc-'+id;
    const n=(data.viewedBy||[]).length;
    if(n>0)vc.innerHTML=`<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg> ${n}`;
    col.appendChild(vc);
  } else if(!data.isVexisAI&&!data.isOfficial) {
    queueView(id);
  }

  row.appendChild(col);

  // ── Dots wrap (inline, right next to bubble) ──
  const wrap=document.createElement('div'); wrap.className='dots-wrap';

  const dotsBtn=document.createElement('button'); dotsBtn.className='dots-btn'; dotsBtn.innerHTML=SVG.dots; dotsBtn.title='Options';
  dotsBtn.onclick=(e)=>{e.stopPropagation();toggleDropdown(id);};
  wrap.appendChild(dotsBtn);

  // Dropdown menu
  const dd=document.createElement('div'); dd.className='msg-dropdown'; dd.id='dd-'+id;
  const ddReply=document.createElement('button');ddReply.className='dd-item';ddReply.innerHTML=SVG.reply+'<span>Reply</span>';
  ddReply.onclick=()=>{setReply(id,data);closeAllDropdowns();};
  const ddReact=document.createElement('button');ddReact.className='dd-item';ddReact.innerHTML=SVG.react+'<span>React</span>';
  ddReact.onclick=(e)=>{e.stopPropagation();closeAllDropdowns();showReactFloater(id);};
  dd.append(ddReply,ddReact);
  if(isOwn&&!me?.isGuest){
    const ddEdit=document.createElement('button');ddEdit.className='dd-item';ddEdit.innerHTML=SVG.edit+'<span>Edit</span>';
    ddEdit.onclick=()=>{closeAllDropdowns();editMsg(id,data.text||'');};
    dd.appendChild(ddEdit);
    const ddDel=document.createElement('button');ddDel.className='dd-item danger';ddDel.innerHTML=SVG.trash+'<span>Delete</span>';
    ddDel.onclick=()=>{closeAllDropdowns();delMsg(id);};
    dd.appendChild(ddDel);
  }
  if(!isOwn){
    const ddReport=document.createElement('button');ddReport.className='dd-item danger';ddReport.innerHTML=SVG.flag+'<span>Report</span>';
    ddReport.onclick=()=>{closeAllDropdowns();reportMsg(id,data);};
    dd.appendChild(ddReport);
  }
  wrap.appendChild(dd);

  // Inline report button (visible on hover, before dots)
  if(!isOwn&&!data.isOfficial&&!data.isVexisAI){
    const rb=document.createElement('button');rb.className='report-btn-inline';rb.title='Report message';
    rb.innerHTML=SVG.flag;rb.onclick=(e)=>{e.stopPropagation();reportMsg(id,data);};
    wrap.insertBefore(rb,dotsBtn);
  }

  // Quick react floater
  const rf=document.createElement('div');rf.className='react-floater';rf.id='rf-'+id;
  ['👍','❤️','😂','😮','😢','🔥','👏','✅'].forEach(em=>{
    const b=document.createElement('button');b.className='rq-btn';b.textContent=em;
    b.onclick=(e)=>{e.stopPropagation();toggleReact(id,em);closeAllDropdowns();};
    rf.appendChild(b);
  });
  wrap.appendChild(rf);
  row.appendChild(wrap);

  chatBody.insertBefore(row,anchor);
}

function buildReactions(cont,msgId,reactions){
  cont.innerHTML='';
  Object.entries(reactions).forEach(([em,uids])=>{
    if(!uids?.length) return;
    const p=document.createElement('button');
    p.className='reaction-pill'+(uids.includes(me?.uid)?' reacted':'');
    p.innerHTML=`${em} <span class="rc">${uids.length}</span>`;
    p.onclick=()=>toggleReact(msgId,em);
    cont.appendChild(p);
  });
}

function updateMsgEl(id,data){
  const rr=document.getElementById('rr-'+id); if(rr) buildReactions(rr,id,data.reactions||{});
  const row=document.getElementById('m-'+id); if(!row) return;
  // Update text (edits)
  const textEl=row.querySelector('.msg-text');
  if(textEl) textEl.innerHTML=renderMentionText(data.text||'')+(data.edited?'<span class="msg-edited">(edited)</span>':'');
  const editArea=document.getElementById('edit-'+id); if(editArea) editArea.remove();
  if(textEl) textEl.style.display='';
  // Update view count
  const vc=document.getElementById('vc-'+id);
  if(vc){const n=(data.viewedBy||[]).length;vc.innerHTML=n>0?`<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg> ${n}`:''}
}

async function toggleReact(msgId,em){
  if(!me) return;
  const ref=db.collection(COL).doc(msgId);
  const snap=await ref.get(); if(!snap.exists) return;
  const uids=(snap.data().reactions||{})[em]||[];
  if(uids.includes(me.uid)) await ref.update({[`reactions.${em}`]:FS.FieldValue.arrayRemove(me.uid)});
  else await ref.update({[`reactions.${em}`]:FS.FieldValue.arrayUnion(me.uid)});
}

function onKey(e){
  const cmdDrop=document.getElementById('cmdDrop');
  if(cmdDrop.classList.contains('open')){
    const items=cmdDrop.querySelectorAll('.cmd-item');
    if(e.key==='ArrowDown'){e.preventDefault();_mentionSelIdx=Math.min(_mentionSelIdx+1,items.length-1);items.forEach((it,i)=>it.classList.toggle('sel',i===_mentionSelIdx));return;}
    if(e.key==='ArrowUp'){e.preventDefault();_mentionSelIdx=Math.max(_mentionSelIdx-1,0);items.forEach((it,i)=>it.classList.toggle('sel',i===_mentionSelIdx));return;}
    if((e.key==='Enter'||e.key==='Tab')&&_mentionSelIdx>=0){e.preventDefault();items[_mentionSelIdx]?.click();return;}
    if(e.key==='Escape'){hideCmdDrop();return;}
  }
  const drop=document.getElementById('mentionDrop');
  if(drop.classList.contains('open')){
    const items=drop.querySelectorAll('.mention-item');
    if(e.key==='ArrowDown'){e.preventDefault();_mentionSelIdx=Math.min(_mentionSelIdx+1,items.length-1);items.forEach((it,i)=>it.classList.toggle('sel',i===_mentionSelIdx));return;}
    if(e.key==='ArrowUp'){e.preventDefault();_mentionSelIdx=Math.max(_mentionSelIdx-1,0);items.forEach((it,i)=>it.classList.toggle('sel',i===_mentionSelIdx));return;}
    if((e.key==='Enter'||e.key==='Tab')&&_mentionSelIdx>=0){e.preventDefault();items[_mentionSelIdx]?.click();return;}
    if(e.key==='Escape'){hideMentionDrop();return;}
  }
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}
}
function onInput(el){
  resizeTA(el);
  const val=el.value;
  if(val.startsWith('/')){
    const query=val.slice(1).toLowerCase();
    showCmdDrop(query);
    hideMentionDrop();
    return;
  }
  hideCmdDrop();
  const q=getMentionQuery();
  if(q!==null)showMentionDrop(q); else hideMentionDrop();
}

let _profUID=null;
async function getCachedUser(uid){

  try{const s=await db.collection('users').doc(uid).get();_userCache[uid]=s.data()||{};return _userCache[uid];}

async function openProfile(uid,baseData){

  const cstatEl=document.getElementById('profCStatus'),roleWrap=document.getElementById('profRoleWrap');

  actEl.innerHTML=''; editRow.style.display='none';

  ]);

  nameEl.textContent=u.displayName||name;
  const status=presData.status||'';
  const online=presData.online===true;
  cstatEl.textContent=status||(online?'🟢 Online':'');
  const role=u.role||'user';
  const RLBL={user:'User',moderator:'Moderator',owner:'Owner',main_owner:'Main Owner',banned:'Banned'};
  roleWrap.innerHTML=`<div class="prof-role ${role}">${RLBL[role]||'User'}</div>`;
  if(u.bio){bioEl.textContent=u.bio;bioEl.style.display='block';}
  const isSelf=uid===me?.uid;
  if(isSelf&&!me?.isGuest){
    editRow.style.display='flex';
    document.getElementById('profEditBio').value=u.bio||'';
    document.getElementById('profEditStatus').value=presData.status||'';
  } else if(me&&!me.isGuest){
    const safeN=(u.displayName||'').replace(/'/g,"\\'");
    if(_friends.has(uid)){
      actEl.innerHTML=`<div class="prof-btn added">✓ Friends</div><button class="prof-btn" onclick="closeProfModal();openDmWith('${uid}','${safeN}')">Message</button>`;
    } else if(_pendingOut.has(uid)){
      actEl.innerHTML=`<div class="prof-btn pending">Request Sent</div>`;
    } else {
      actEl.innerHTML=`<button class="prof-btn" onclick="sendFriendReq('${uid}','${safeN}')">Add Friend</button><button class="prof-btn" onclick="closeProfModal();openDmWith('${uid}','${safeN}')">Message</button>`;
    }
  }
}
function closeProfModal(){document.getElementById('profOverlay').classList.remove('open');_profUID=null;}
async function saveProfEdit(){
  if(!me)return;
  const bio=document.getElementById('profEditBio').value.trim().slice(0,120);
  const status=document.getElementById('profEditStatus').value.trim().slice(0,60);
  try{
    await db.collection('users').doc(me.uid).update({bio});

  }catch{toast('Failed to save');}
}
async function sendFriendReq(toUid,toName){
  if(!me||me.isGuest){toast('Sign in to add friends');return;}
  const reqId=`${toUid}_${me.uid}`;
  try{
    await db.collection('friendRequests').doc(reqId).set({
      to:toUid,from:me.uid,fromName:me.displayName||'Someone',
      fromPhoto:me.photoURL||null,status:'pending',
      timestamp:FS.FieldValue.serverTimestamp(),
    });
    await db.collection('notifications').doc(toUid).set({friendRequests:FS.FieldValue.increment(1)},{merge:true});
    _pendingOut.add(toUid);

function openDmWith(uid,name){
  if(window.top && window.top !== window && typeof window.top.openIframe === 'function'){
    window.top.openIframe('DMs', `/social/dm.html?uid=${encodeURIComponent(uid)}&name=${encodeURIComponent(name)}`, 'social');

async function loadFriendsCache(){

    s.docs.forEach(d=>_pendingOut.add(d.data().to));
  }catch{}
}

// ── MESSAGE EDIT ──────────────────────────────────────────────────────────────
function editMsg(id,origText){
  const row=document.getElementById('m-'+id); if(!row)return;
  const textEl=row.querySelector('.msg-text'); if(!textEl)return;
  textEl.style.display='none';
  const area=document.createElement('textarea');
  area.className='edit-area';area.value=origText;area.id='edit-'+id;
  area.addEventListener('input',()=>{area.style.height='auto';area.style.height=area.scrollHeight+'px';});
  area.addEventListener('keydown',e=>{
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();saveEdit(id,origText);}
    if(e.key==='Escape'){cancelEdit(id,textEl);}
  });
  textEl.parentNode.insertBefore(area,textEl.nextSibling);
  area.style.height=area.scrollHeight+'px';area.focus();
}
async function saveEdit(id,origText){
  const area=document.getElementById('edit-'+id); if(!area)return;
  const newText=area.value.trim();
  if(!newText||newText===origText){cancelEdit(id,document.querySelector(`#m-${id} .msg-text`));return;}
  try{await db.collection(COL).doc(id).update({text:newText,edited:true});}
  catch{toast('Failed to edit');}
}
function cancelEdit(id,textEl){
  const area=document.getElementById('edit-'+id); if(area)area.remove();
  if(textEl)textEl.style.display='';
}

// ── VIEW TRACKING ─────────────────────────────────────────────────────────────
const _viewQueue=new Set();let _viewTimer=null;
function queueView(id){
  _viewQueue.add(id);
  clearTimeout(_viewTimer);
  _viewTimer=setTimeout(flushViews,1800);
}
async function flushViews(){
  if(!me||me.isGuest||!_viewQueue.size)return;
  const ids=[..._viewQueue];_viewQueue.clear();
  const batch=db.batch();
  ids.forEach(id=>batch.update(db.collection(COL).doc(id),{viewedBy:FS.FieldValue.arrayUnion(me.uid)}));
  try{await batch.commit();}catch{}
}

// ── MENTIONS ──────────────────────────────────────────────────────────────────
function renderMentionText(text){
  if(!text)return'';
  const esc=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return esc.replace(/@([\w][\w ]{0,19})/g,'<span class="mention">@$1</span>');
}
function getMentionQuery(){
  const val=msgInput.value,pos=msgInput.selectionStart;
  const m=val.slice(0,pos).match(/@([\w ]*)$/);
  return m?m[1]:null;
}
function showMentionDrop(query){
  const drop=document.getElementById('mentionDrop');
  const list=_onlineUsers.filter(u=>u.displayName?.toLowerCase().includes(query.toLowerCase())&&u.uid!==me?.uid).slice(0,8);
  if(!list.length){drop.classList.remove('open');return;}
  _mentionSelIdx=-1;
  drop.innerHTML=list.map(u=>{
    const bg=u.photoURL?`background-image:url('${u.photoURL}');background-size:cover;color:transparent;`:`background:${strColor(u.uid)};`;
    const init=u.photoURL?'':(u.displayName||'?')[0].toUpperCase();
    return `<div class="mention-item" onclick="insertMention('${u.displayName.replace(/'/g,"\\'")}')"><div class="mention-av-sm" style="${bg}">${init}</div><span class="mention-name">${u.displayName}</span></div>`;
  }).join('');
  drop.classList.add('open');
}
function hideMentionDrop(){document.getElementById('mentionDrop').classList.remove('open');_mentionSelIdx=-1;}

const SLASH_COMMANDS=[
  {name:'/vexis',desc:'Ask Vexis AI anything',icon:'✦',insert:'/vexis '},
];
function showCmdDrop(query){
  const drop=document.getElementById('cmdDrop');
  const matches=SLASH_COMMANDS.filter(c=>c.name.slice(1).startsWith(query));
  if(!matches.length){drop.classList.remove('open');return;}
  _mentionSelIdx=-1;
  drop.innerHTML=matches.map(c=>`
    <div class="cmd-item" onclick="insertCmd('${c.insert}')">
      <div class="cmd-icon">${c.icon}</div>
      <div><div class="cmd-name">${c.name}</div><div class="cmd-desc">${c.desc}</div></div>
    </div>`).join('');
  drop.classList.add('open');
}
function hideCmdDrop(){document.getElementById('cmdDrop').classList.remove('open');_mentionSelIdx=-1;}
function insertCmd(insert){
  msgInput.value=insert;
  msgInput.selectionStart=msgInput.selectionEnd=insert.length;
  msgInput.focus();
  hideCmdDrop();
}
function insertMention(name){
  const val=msgInput.value,pos=msgInput.selectionStart;
  const before=val.slice(0,pos).replace(/@[\w ]*$/,`@${name} `);
  msgInput.value=before+val.slice(pos);
  msgInput.selectionStart=msgInput.selectionEnd=before.length;
  msgInput.focus();hideMentionDrop();
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
auth.onAuthStateChanged(user=>{
  if(user){
    me=user;
    loadFriendsCache();
  } else {
    me={uid:'guest_'+Math.random().toString(36).slice(2,9),displayName:localStorage.getItem('vexis-display-name')||'Guest',photoURL:localStorage.getItem('vexis-profile-photo')||null,isGuest:true};
    setInterval(()=>{const n=localStorage.getItem('vexis-display-name'),p=localStorage.getItem('vexis-profile-photo');if(n)me.displayName=n;if(p)me.photoURL=p;},3000);
  }
  buildEmojiPanel(); loadTrending(); listenMsgs(); trackPresence();
});

// ── UTILS ─────────────────────────────────────────────────────────────────────
function fmtTime(d){return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function fmtDate(d){
  const t=new Date(),y=new Date(t);y.setDate(t.getDate()-1);
  if(d.toDateString()===t.toDateString()) return 'Today';
  if(d.toDateString()===y.toDateString()) return 'Yesterday';
  return d.toLocaleDateString([],{weekday:'long',month:'long',day:'numeric'});
}
function strColor(s){let h=0;for(let i=0;i<s.length;i++)h=((h<<5)-h)+s.charCodeAt(i);return`hsl(${Math.abs(h)%360},55%,45%)`;}
let _tt;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('on');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('on'),2800);}
</script>
