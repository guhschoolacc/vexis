<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banned · Vexis</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0d0303;color:#c8c8c8;font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center}
.wrap{text-align:center;padding:40px 24px;max-width:420px}
.icon{width:72px;height:72px;margin:0 auto 24px;border-radius:50%;background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);display:flex;align-items:center;justify-content:center}
.icon svg{color:#f85149}
h1{font-size:1.4rem;font-weight:700;color:#f5f5f5;margin-bottom:10px}
p{font-size:.82rem;color:#7a7a7a;line-height:1.6;margin-bottom:24px}
.uid{font-family:monospace;font-size:.72rem;color:#4a4a4a;background:#111;border:1px solid #1e1e1e;border-radius:6px;padding:6px 12px;display:inline-block;margin-bottom:24px;word-break:break-all}
.btn{display:inline-block;padding:0 20px;height:38px;line-height:38px;border-radius:8px;background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.25);color:#f85149;font-size:.78rem;font-weight:600;cursor:pointer;text-decoration:none;font-family:inherit;transition:background .15s}
.btn:hover{background:rgba(248,81,73,.18)}
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
    </svg>
  </div>
  <h1>You've been banned</h1>
  <p>Your account has been suspended from Vexis. If you believe this is a mistake, please contact a staff member.</p>
  <div class="uid" id="uidBox">Loading…</div><br>
  <button class="btn" onclick="signOut()">Sign out</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyCR8I5eOiZbHzVZJDEQHYpyxXbcClk_rxA",
  authDomain:"goon-7ddc3.firebaseapp.com",
  projectId:"goon-7ddc3",
  storageBucket:"goon-7ddc3.firebasestorage.app",
  messagingSenderId:"117099331820",
  appId:"1:117099331820:web:3af984b15a843d3d7b65c9"
});
firebase.auth().onAuthStateChanged(user => {
  if (user) {
    document.getElementById('uidBox').textContent = 'UID: ' + user.uid;
  } else {
    window.location.href = 'index.html';
  }
});
function signOut() {
  firebase.auth().signOut().then(() => { window.location.href = 'index.html'; });
}
</script>
</body>
</html>
