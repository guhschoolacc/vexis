  /* ═══════════════════════════════════════════════
     BASE STYLES
  ═══════════════════════════════════════════════ */
  *,
  *::before,
  *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  html,
  body {
    height: 100%;
    overflow: hidden;
    font-family: 'Syne', sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    transition: background 0.5s ease, color 0.5s ease;
  }
  .browser-shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
    width: 100%;
    overflow: hidden;
  }
  .browser-chrome {
    flex-shrink: 0;
    background: var(--chrome-bg);
    border-bottom: 1px solid var(--chrome-border);
    user-select: none;
    box-shadow: 0 2px 20px rgba(0, 0, 0, 0.6);
    transition: background 0.5s, border-color 0.5s;
  }
  .tab-bar {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    padding: 8px 12px 0 14px;
    background: var(--tab-bar-bg);
    height: 40px;
    overflow: hidden;
    transition: background 0.5s;
  }
  .tab {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 6px 14px;
    background: rgba(var(--accent-rgb), 0.12);
    border: 1px solid rgba(var(--accent-rgb), 0.2);
    border-bottom: none;
    border-radius: 8px 8px 0 0;
    font-size: 11.5px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    min-width: 140px;
    max-width: 220px;
    white-space: nowrap;
    overflow: hidden;
  }
  .tab.active {
    background: var(--tab-bg);
    border-color: rgba(var(--accent-rgb), 0.35);
    color: var(--text-primary);
    z-index: 2;
  }
  .tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    right: 0;
    height: 1px;
    background: var(--tab-bg);
  }
  .tab-favicon {
    width: 13px;
    height: 13px;
    border-radius: 3px;
    background: linear-gradient(135deg, var(--accent2), var(--neon));
    flex-shrink: 0;
    box-shadow: 0 0 6px rgba(var(--accent-rgb), 0.7);
    transition: background 0.5s, box-shadow 0.5s;
  }
  .tab-title {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    font-size: 11px;
  }
  .tab-close {
    width: 15px;
    height: 15px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: rgba(var(--accent-rgb), 0.6);
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .tab-close:hover {
    background: rgba(var(--accent-rgb), 0.2);
    color: var(--accent3);
  }
  .tab-new {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(var(--accent-rgb), 0.5);
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 2px;
    flex-shrink: 0;
  }
  .tab-new:hover {
    background: rgba(var(--accent-rgb), 0.15);
    color: var(--accent3);
  }
  .toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    background: var(--tab-bg);
    border-top: 1px solid rgba(var(--accent-rgb), 0.12);
    height: 42px;
    transition: background 0.5s;
  }
  .nav-btn {
    width: 28px;
    height: 28px;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(var(--accent-rgb), 0.6);
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
    font-size: 13px;
  }
  .nav-btn:hover {
    background: rgba(var(--accent-rgb), 0.15);
    color: var(--accent3);
  }
  .nav-btn.disabled {
    opacity: 0.25;
    pointer-events: none;
  }
  .url-bar-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    background: rgba(0, 0, 0, 0.45);
    border: 1px solid rgba(var(--accent-rgb), 0.22);
    border-radius: 10px;
    padding: 0 12px;
    height: 28px;
    gap: 7px;
    cursor: text;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .url-bar-wrap:hover {
    border-color: rgba(var(--accent-rgb), 0.4);
    box-shadow: 0 0 10px rgba(var(--accent-rgb), 0.15);
  }
  .url-lock {
    font-size: 10px;
    color: rgba(100, 200, 130, 0.7);
    flex-shrink: 0;
  }
  .url-text {
    font-family: 'Syne Mono', monospace;
    font-size: 11.5px;
    color: rgba(var(--accent-rgb), 0.9);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .url-scheme {
    color: rgba(140, 200, 255, 0.5);
  }
  .url-host {
    color: var(--accent3);
  }
  .chrome-nav-icons {
    display: flex;
    align-items: center;
    gap: 5px;
    flex-shrink: 0;
  }
  .chrome-icon-btn {
    width: 32px;
    height: 32px;
    border-radius: 10px;
    background: rgba(var(--accent-rgb), 0.12);
    border: 1px solid rgba(var(--accent-rgb), 0.18);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.22s;
    color: rgba(var(--accent-rgb), 0.7);
    position: relative;
    backdrop-filter: blur(8px);
  }
  .chrome-icon-btn svg {
    width: 14px;
    height: 14px;
  }
  .chrome-icon-btn:hover {
    background: rgba(var(--accent-rgb), 0.25);
    border-color: rgba(var(--accent-rgb), 0.5);
    color: var(--accent3);
    box-shadow: 0 0 12px rgba(var(--accent-rgb), 0.25);
    transform: translateY(-1px);
  }
  .chrome-notif-dot {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent2);
    box-shadow: 0 0 5px var(--accent2);
    border: 1.5px solid var(--tab-bar-bg);
    animation: notifPulse 2s ease-in-out infinite;
  }
  @keyframes notifPulse {
    0%, 100% { box-shadow: 0 0 4px var(--accent2); }
    50% { box-shadow: 0 0 10px var(--accent2), 0 0 20px rgba(var(--accent-rgb), 0.4); }
  }
  .chrome-icon-btn.settings-active {
    background: rgba(var(--accent-rgb), 0.28) !important;
    border-color: rgba(var(--accent-rgb), 0.55) !important;
    color: var(--accent3) !important;
    box-shadow: 0 0 14px rgba(var(--accent-rgb), 0.35) !important;
  }
  .chrome-icon-btn.logged-in {

  /* ── PAGE CONTENT ─────────────────────────────── */
  .page-content {

  }
  .grid-overlay {

  }

    left: 0;
    right: 0;
    bottom: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .hero {
    text-align: center;
    margin-bottom: 36px;
  }

  }

  }
  .hero-title::before {

  }

  }
  .hero-title-glow {

    transition: background 0.6s;
  }
  @keyframes pulseGlow {

  }
  .hero-subtitle {
    font-size: 13.5px;

  }

    margin-bottom: 32px;
    animation: fadeUp 0.8s 0.3s ease both;
  }
  .search-bar {
    width: 100%;

  /* ═══════════════════════════════════════════════
     CARDS GRID — REDESIGNED
  ═══════════════════════════════════════════════ */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    width: 100%;
    max-width: 450px;
    margin-bottom: 32px;

  }
  .card {

    border-radius: 18px;

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);

    overflow: hidden;
    backdrop-filter: blur(20px);
    padding: 12px 8px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.25);
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--card-accent-top), var(--accent2), var(--card-accent-top), transparent);
    opacity: 0.5;
    transition: opacity 0.35s, height 0.35s;
    border-radius: 18px 18px 0 0;
  }
  .card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 30%, rgba(var(--accent-rgb), 0.18) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.35s;
    border-radius: 18px;
  }
  .card:hover {

    background: rgba(var(--accent-rgb), 0.16);
    border-color: rgba(var(--accent-rgb), 0.5);
    box-shadow: 0 12px 36px rgba(var(--accent-rgb), 0.35), 0 0 0 1px rgba(var(--accent-rgb), 0.2), 0 0 60px var(--card-hover-glow);
  }
  .card:hover::before { opacity: 1; height: 5px; }
  .card:hover::after { opacity: 1; }
  .card:active { transform: translateY(-2px) scale(1.01); transition: all 0.12s; }
  .card-icon-wrap {
    width: 48px; height: 48px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(var(--accent-rgb), 0.1);
    border: 1px solid rgba(var(--accent-rgb), 0.2);
    transition: all 0.35s; position: relative; z-index: 1; backdrop-filter: blur(8px);
  }
  .card:hover .card-icon-wrap {
    transform: scale(1.12);
    background: rgba(var(--accent-rgb), 0.2);
    border-color: rgba(var(--accent-rgb), 0.45);
    box-shadow: 0 0 22px rgba(var(--accent-rgb), 0.4);
  }
  .card-icon { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; position: relative; transition: all 0.35s; }
  .card-icon svg { width: 28px; height: 28px; filter: drop-shadow(0 0 4px currentColor); transition: filter 0.35s; }
  .card:hover .card-icon svg { filter: drop-shadow(0 0 8px currentColor); }
  .card-label { font-size: 11px; font-weight: 700; color: var(--text-secondary); text-align: center; letter-spacing: 0.4px; transition: color 0.3s; position: relative; z-index: 1; }
  .card:hover .card-label { color: var(--text-primary); }
  .card-desc { font-size: 8.5px; color: var(--text-muted); text-align: center; letter-spacing: 0.2px; font-family: 'Syne Mono', monospace; transition: color 0.3s; position: relative; z-index: 1; margin-top: -4px; }
  .card:hover .card-desc { color: rgba(var(--accent-rgb), 0.7); }

  /* ═══════════════════════════════════════════════
     PINNED SECTION
  ═══════════════════════════════════════════════ */
  .pinned-section {
    width: 100%; max-width: 450px;

    backdrop-filter: blur(20px); position: relative;

  }

  .edit-btn { font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: rgba(var(--accent-rgb), 0.6); cursor: pointer; transition: all 0.2s; padding: 4px 10px; border-radius: 8px; border: 1px solid rgba(var(--accent-rgb), 0.15); background: rgba(var(--accent-rgb), 0.06); font-family: 'Syne Mono', monospace; }
  .edit-btn:hover { color: var(--accent3); border-color: rgba(var(--accent-rgb), 0.35); background: rgba(var(--accent-rgb), 0.12); }
  .pinned-slots { display: flex; gap: 10px; align-items: center; flex-wrap: nowrap; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
  .pinned-slots::-webkit-scrollbar { display: none; }
  .pin-slot { flex-shrink: 0; width: 56px; height: 56px; border-radius: 16px; border: 1.5px dashed rgba(var(--accent-rgb), 0.22); background: rgba(var(--accent-rgb), 0.04); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.25s; position: relative; }
  .pin-slot:hover { border-color: rgba(var(--accent-rgb), 0.4); background: rgba(var(--accent-rgb), 0.1); box-shadow: 0 0 14px rgba(var(--accent-rgb), 0.2); }
  .pin-slot::before { content: ''; width: 18px; height: 18px; border-radius: 50%; background: rgba(var(--accent-rgb), 0.08); border: 1px dashed rgba(var(--accent-rgb), 0.2); transition: all 0.25s; }
  .pin-slot:hover::before { transform: scale(1.1); border-color: rgba(var(--accent-rgb), 0.4); }
  .pin-add-btn { flex-shrink: 0; width: 56px; height: 56px; border-radius: 16px; background: rgba(var(--accent-rgb), 0.1); border: 1px solid rgba(var(--accent-rgb), 0.22); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.25s; color: rgba(var(--accent-rgb), 0.6); font-size: 22px; font-weight: 300; line-height: 1; }
  .pin-add-btn:hover { background: rgba(var(--accent-rgb), 0.2); border-color: rgba(var(--accent-rgb), 0.45); color: var(--accent3); box-shadow: 0 0 16px rgba(var(--accent-rgb), 0.3); transform: scale(1.05); }

  /* ── PARTICLES ────────────────────────────────── */
  .particles { position: fixed; top: 82px; left: 0; right: 0; bottom: 0; pointer-events: none; overflow: hidden; z-index: 0; }
  .particle { position: absolute; border-radius: 50%; animation: floatParticle linear infinite; animation-fill-mode: backwards; opacity: 0; }
  @keyframes floatParticle {
    0% { transform: translateY(105%) scale(0); opacity: 0; }
    5% { opacity: 0.7; }
    15% { opacity: 0.9; }
    85% { opacity: 0.5; }
    100% { transform: translateY(-10%) scale(1); opacity: 0; }
  }

  /* ── SCROLLBAR ────────────────────────────────── */
  .page-content::-webkit-scrollbar { width: 4px; }
  .page-content::-webkit-scrollbar-track { background: transparent; }
  .page-content::-webkit-scrollbar-thumb { background: rgba(var(--accent-rgb), 0.3); border-radius: 2px; }
  .page-content::-webkit-scrollbar-thumb:hover { background: rgba(var(--accent-rgb), 0.5); }

  /* ── ANIMATIONS ───────────────────────────────── */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes wiggle { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-2.5deg); } 75% { transform: rotate(2.5deg); } }
  @keyframes fadeInScale { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }

  /* ══════════════════════════════════════════════
     SETTINGS PANEL
  ══════════════════════════════════════════════ */
  .settings-backdrop { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(6px); z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.35s ease; }
  .settings-backdrop.open { opacity: 1; pointer-events: all; }
  .settings-panel { position: fixed; top: 0; right: 0; bottom: 0; width: 360px; max-width: 94vw; background: rgba(4, 2, 10, 0.97); border-left: 1px solid rgba(var(--accent-rgb), 0.22); box-shadow: -16px 0 80px rgba(0, 0, 0, 0.8); z-index: 201; transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.5s; display: flex; flex-direction: column; overflow: hidden; }
  .settings-panel.open { transform: translateX(0); }
  .settings-header { display: flex; align-items: center; justify-content: space-between; padding: 22px 24px 18px; border-bottom: 1px solid rgba(var(--accent-rgb), 0.12); flex-shrink: 0; }
  .settings-title { font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: var(--text-primary); }
  .settings-close { width: 32px; height: 32px; border-radius: 10px; background: rgba(var(--accent-rgb), 0.1); border: 1px solid rgba(var(--accent-rgb), 0.2); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-secondary); font-size: 15px; transition: all 0.2s; }
  .settings-close:hover { background: rgba(var(--accent-rgb), 0.22); color: var(--text-primary); transform: scale(1.05); }
  .settings-body { flex: 1; overflow-y: auto; padding: 22px 24px 40px; scrollbar-width: thin; scrollbar-color: rgba(var(--accent-rgb), 0.25) transparent; }
  .settings-body::-webkit-scrollbar { width: 3px; }
  .settings-body::-webkit-scrollbar-thumb { background: rgba(var(--accent-rgb), 0.3); border-radius: 2px; }
  .settings-section { margin-bottom: 30px; }
  .settings-section-label { font-size: 9.5px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--text-muted); font-family: 'Syne Mono', monospace; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
  .settings-section-label::after { content: ''; flex: 1; height: 1px; background: rgba(var(--accent-rgb), 0.1); }
  .theme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; }
  .theme-card { border-radius: 14px; overflow: hidden; cursor: pointer; border: 2px solid transparent; transition: all 0.28s cubic-bezier(0.34, 1.56, 0.64, 1); position: relative; }

  .theme-preview { height: 58px; position: relative; overflow: hidden; }
  .theme-preview-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px); background-size: 14px 14px; }

  .theme-badge { position: absolute; top: 5px; left: 7px; font-size: 8px; font-family: 'Syne Mono', monospace; letter-spacing: 0.5px; padding: 2px 5px; border-radius: 4px; color: rgba(255, 255, 255, 0.7); backdrop-filter: blur(4px); }

  /* ══════════════════════════════════════════════
     LOGIN / AUTH MODAL
  ══════════════════════════════════════════════ */

  <script>

    /* ═══════════════════════════════════════════
       THEME DEFINITIONS
    ═══════════════════════════════════════════ */
    const THEMES = [
      { id: 'default', name: 'Vexis', bg: '#06040f', accent: '#b44dff', glow: '#9030ee', bar: 'linear-gradient(90deg,#8b2be2,#d480ff)', badge: '✦ OG', badgeBg: 'rgba(140,50,220,0.3)', fx: 'particles' },
      { id: 'crimson', name: 'Crimson', bg: '#0f0408', accent: '#ff4d4d', glow: '#cc2020', bar: 'linear-gradient(90deg,#d42020,#ff8080)', badge: '🔥 HOT', badgeBg: 'rgba(180,20,20,0.35)', fx: 'embers' },
      { id: 'ocean', name: 'Ocean', bg: '#020a0f', accent: '#1ab8e0', glow: '#0090cc', bar: 'linear-gradient(90deg,#0a7ea4,#60d8ff)', badge: '〜 DEEP', badgeBg: 'rgba(0,120,180,0.3)', fx: 'waves' },
      { id: 'gold', name: 'Gold', bg: '#0a0800', accent: '#e0a800', glow: '#b07800', bar: 'linear-gradient(90deg,#a07800,#ffd040)', badge: '★ ROYAL', badgeBg: 'rgba(140,100,0,0.35)', fx: 'sparkles' },
      { id: 'matrix', name: 'Matrix', bg: '#000a02', accent: '#00cc44', glow: '#008020', bar: 'linear-gradient(90deg,#008020,#40ff88)', badge: '> CODE', badgeBg: 'rgba(0,120,30,0.3)', fx: 'matrix' },
      { id: 'sakura', name: 'Sakura', bg: '#0f0208', accent: '#ee44aa', glow: '#bb2088', bar: 'linear-gradient(90deg,#c02080,#ff88cc)', badge: '✿ BLOOM', badgeBg: 'rgba(180,30,100,0.3)', fx: 'petals' },
      { id: 'solar', name: 'Solar', bg: '#0f0600', accent: '#ff6600', glow: '#cc4400', bar: 'linear-gradient(90deg,#c04000,#ff9940)', badge: '☀ FLARE', badgeBg: 'rgba(160,60,0,0.35)', fx: 'flares' },
      { id: 'arctic', name: 'Arctic', bg: '#020810', accent: '#3088ff', glow: '#1050c0', bar: 'linear-gradient(90deg,#1050c0,#80c0ff)', badge: '❄ ICY', badgeBg: 'rgba(20,70,180,0.3)', fx: 'snow' },
      { id: 'void', name: 'Void', bg: '#030303', accent: '#909090', glow: '#505050', bar: 'linear-gradient(90deg,#505050,#c8c8c8)', badge: '◉ NULL', badgeBg: 'rgba(60,60,60,0.35)', fx: 'glitch' },
      { id: 'toxic', name: 'Toxic', bg: '#030800', accent: '#99cc00', glow: '#608000', bar: 'linear-gradient(90deg,#608000,#ccff33)', badge: '☣ DRIP', badgeBg: 'rgba(80,120,0,0.3)', fx: 'toxic' },
      { id: 'nebula', name: 'Nebula', bg: '#0a0010', accent: '#cc00ff', glow: '#8800cc', bar: 'linear-gradient(90deg,#8800cc,#ee66ff)', badge: '✧ DEEP', badgeBg: 'rgba(120,0,200,0.3)', fx: 'nebula' },
      { id: 'copper', name: 'Copper', bg: '#080402', accent: '#d07840', glow: '#a05020', bar: 'linear-gradient(90deg,#a05020,#f0b080)', badge: '⬡ FORGE', badgeBg: 'rgba(130,60,20,0.3)', fx: 'copper' },
    ];

    const grid = document.getElementById('themeGrid');
    let activeTheme = localStorage.getItem('vexis-theme') || 'default';

    function buildThemeGrid() {
      grid.innerHTML = '';
      THEMES.forEach(t => {
        const card = document.createElement('div');
        card.className = 'theme-card' + (t.id === activeTheme ? ' active' : '');
        card.dataset.theme = t.id;
        card.innerHTML = `<div class="theme-preview" style="background:${t.bg};"><div class="theme-preview-grid"></div><div class="theme-preview-glow" style="background:${t.glow};"></div><div class="theme-badge" style="background:${t.badgeBg}">${t.badge}</div><div class="theme-preview-bar" style="background:${t.bar};"></div></div><div class="theme-name" style="background:${t.bg};">${t.name}</div>`;
        card.addEventListener('click', () => applyTheme(t.id));
        grid.appendChild(card);
      });
    }

    function applyTheme(id) {
      activeTheme = id;
      localStorage.setItem('vexis-theme', id);
      document.body.dataset.theme = id === 'default' ? '' : id;
      document.querySelectorAll('.theme-card').forEach(c => c.classList.toggle('active', c.dataset.theme === id));
      rebuildParticles();
      rebuildThemeFX(id);
    }

    /* ═══════════════════════════════════════════
       PARTICLES
    ═══════════════════════════════════════════ */
    const particleContainer = document.getElementById('particles');
    function rebuildParticles() {
      particleContainer.innerHTML = '';
      const hueMap = { default: 275, crimson: 0, ocean: 195, gold: 45, matrix: 140, sakura: 320, solar: 25, arctic: 215, void: 0, toxic: 75, nebula: 290, copper: 28 };
      const hue = hueMap[activeTheme] || 275;
      const isMono = activeTheme === 'void';
      for (let i = 0; i < 22; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 2.5 + 1;
        const color = isMono ? `rgba(180,180,180,${0.2+Math.random()*0.3})` : `hsl(${hue+Math.random()*40-20},100%,${65+Math.random()*20}%)`;
        p.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;width:${size}px;height:${size}px;animation-duration:${7+Math.random()*14}s;animation-delay:${Math.random()*10}s;opacity:0;background:${color};`;
        particleContainer.appendChild(p);
      }
    }

    /* ═══════════════════════════════════════════
       THEME FX ENGINE
    ═══════════════════════════════════════════ */
    const themeFxEl = document.getElementById('themeFx');
    function rebuildThemeFX(id) {
      themeFxEl.innerHTML = '';
      const fxMap = { matrix: buildMatrixFX, crimson: buildEmberFX, ocean: buildWaveFX, gold: buildSparklesFX, sakura: buildPetalFX, solar: buildFlareFX, arctic: buildSnowFX, void: buildGlitchFX, toxic: buildToxicFX, nebula: buildNebulaFX, copper: buildCopperFX };
      if (fxMap[id]) fxMap[id]();
    }

    function buildMatrixFX() { const chars = '0ア1イ2ウ3エ4オ01カキクケコ101サシスセソ'; for (let i=0;i<22;i++){const c=document.createElement('div');c.className='matrix-col';c.style.left=`${(i/22)*100+Math.random()*3}%`;c.style.animationDuration=`${5+Math.random()*8}s`;c.style.animationDelay=`${Math.random()*8}s`;c.style.fontSize=`${10+Math.random()*5}px`;c.style.opacity=`${0.2+Math.random()*0.5}`;let t='';for(let j=0;j<20;j++)t+=chars[Math.floor(Math.random()*chars.length)]+' ';c.textContent=t;themeFxEl.appendChild(c);} }
    function buildEmberFX() { for (let i=0;i<24;i++){const e=document.createElement('div');e.className='ember';const s=2+Math.random()*4;const d=(Math.random()-0.5)*80;e.style.cssText=`left:${Math.random()*100}%;width:${s}px;height:${s}px;background:hsl(${Math.random()*40},100%,${55+Math.random()*20}%);--drift:${d}px;animation-duration:${4+Math.random()*6}s;animation-delay:${Math.random()*5}s;`;themeFxEl.appendChild(e);} }
    function buildWaveFX() { for (let i=0;i<5;i++){const w=document.createElement('div');w.className='depth-wave';w.style.cssText=`top:${15+i*18}%;background:rgba(30,180,230,${0.1+i*0.03});animation-duration:${8+i*3}s;animation-delay:${i*0.8}s;`;themeFxEl.appendChild(w);} }
    function buildSparklesFX() { for (let i=0;i<30;i++){const s=document.createElement('div');s.className='gold-sparkle';s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${2+Math.random()*3}px;height:${2+Math.random()*3}px;background:hsl(${40+Math.random()*20},100%,70%);animation-duration:${1+Math.random()*3}s;animation-delay:${Math.random()*3}s;`;themeFxEl.appendChild(s);} }
    function buildPetalFX() { const colors=['rgba(255,160,200,0.6)','rgba(255,180,210,0.5)','rgba(255,140,190,0.55)','rgba(255,200,220,0.45)'];for(let i=0;i<20;i++){const p=document.createElement('div');p.className='petal';const s=5+Math.random()*8;p.style.cssText=`left:${Math.random()*100}%;width:${s}px;height:${s}px;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${7+Math.random()*8}s;animation-delay:${Math.random()*8}s;`;themeFxEl.appendChild(p);} }
    function buildFlareFX() { const cx=50+(Math.random()-0.5)*30;const cy=50+(Math.random()-0.5)*30;for(let i=0;i<4;i++){const r=document.createElement('div');r.className='flare-ring';const s=60+i*30;r.style.cssText=`width:${s}px;height:${s}px;left:${cx}%;top:${cy}%;border-color:rgba(255,${100-i*20},0,${0.25-i*0.04});animation-duration:${4+i*1.5}s;animation-delay:${i*1.2}s;`;themeFxEl.appendChild(r);} }
    function buildSnowFX() { const flakes=['❄','❅','❆','·','*'];for(let i=0;i<22;i++){const s=document.createElement('div');s.className='snowflake';s.textContent=flakes[Math.floor(Math.random()*flakes.length)];s.style.cssText=`left:${Math.random()*100}%;font-size:${8+Math.random()*12}px;animation-duration:${8+Math.random()*10}s;animation-delay:${Math.random()*10}s;color:rgba(${160+Math.floor(Math.random()*60)},${200+Math.floor(Math.random()*40)},255,${0.3+Math.random()*0.4});`;themeFxEl.appendChild(s);} }
    function buildGlitchFX() { for(let i=0;i<3;i++){const g=document.createElement('div');g.className='glitch-line';g.style.cssText=`animation-duration:${5+i*2.5}s;animation-delay:${i*1.8}s;opacity:${0.3+i*0.1};`;themeFxEl.appendChild(g);}for(let i=0;i<12;i++){const s=document.createElement('div');s.className='static-block';s.style.cssText=`left:${Math.random()*90}%;top:${Math.random()*90}%;width:${20+Math.random()*60}px;height:${2+Math.random()*8}px;animation-duration:${0.3+Math.random()*0.8}s;animation-delay:${Math.random()*4}s;`;themeFxEl.appendChild(s);} }
    function buildToxicFX() { for(let i=0;i<3;i++){const r=document.createElement('div');r.className='toxic-ring';const s=40+i*20;r.style.cssText=`width:${s}px;height:${s}px;left:50%;top:50%;border-color:rgba(${150+i*20},${210+i*10},0,0.25);animation-duration:${3+i*1.2}s;animation-delay:${i*1}s;`;themeFxEl.appendChild(r);}for(let i=0;i<16;i++){const d=document.createElement('div');d.className='toxic-drip';d.style.cssText=`left:${Math.random()*100}%;width:${1+Math.random()*2}px;background:linear-gradient(to bottom,rgba(170,238,0,0.8),rgba(100,180,0,0.2));animation-duration:${1.5+Math.random()*3}s;animation-delay:${Math.random()*4}s;`;themeFxEl.appendChild(d);} }
    function buildNebulaFX() { const colors=['rgba(150,0,230,0.2)','rgba(200,0,255,0.15)','rgba(100,0,180,0.18)','rgba(230,80,255,0.12)'];for(let i=0;i<4;i++){const s=document.createElement('div');s.className='nebula-swirl';s.style.cssText=`width:${200+Math.random()*200}px;height:${200+Math.random()*200}px;left:${Math.random()*80}%;top:${Math.random()*80}%;background:${colors[i]};animation-duration:${10+i*4}s;animation-delay:${i*2}s;`;themeFxEl.appendChild(s);} }
    function buildCopperFX() { for(let i=0;i<5;i++){const s=document.createElement('div');s.className='copper-shimmer';s.style.cssText=`left:${Math.random()*80}%;top:${Math.random()*80}%;animation-duration:${8+Math.random()*6}s;animation-delay:${i*1.5}s;background:radial-gradient(circle,rgba(${160+Math.floor(Math.random()*40)},${80+Math.floor(Math.random()*40)},${20+Math.floor(Math.random()*30)},0.18) 0%,transparent 70%);`;themeFxEl.appendChild(s);} }

    /* ═══════════════════════════════════════════
       PAGE ROUTER
    ═══════════════════════════════════════════ */
    const pageInner = document.getElementById('pageInner');

    /* ── Restore layout after full-screen pages ─ */
    function gcRestoreLayout() {
      const pc = document.getElementById('pageContent');
      if (pc) pc.style.overflow = '';
      ['padding','height','minHeight','display','flexDirection','alignItems'].forEach(p => { pageInner.style[p] = ''; });
      const els = [document.querySelector('.grid-overlay'), document.getElementById('particles'), document.getElementById('themeFx'), document.querySelector('.scanlines')];
      els.forEach(el => { if (el) el.style.display = ''; });
      if (window._gcUnsubscribe) { window._gcUnsubscribe(); window._gcUnsubscribe = null; }
    }
    const urlHost = document.querySelector('.url-host');
    const navBack = document.getElementById('navBack');
    const navFwd = document.getElementById('navFwd');
    const reloadBtn = document.getElementById('reloadBtn');

    let navHistory = ['home'];
    let navIndex = 0;
    let currentPage = 'home';

    const PAGE_TITLES = { home:'Vexis — Home', games:'Vexis — Games', tools:'Vexis — Tools', apps:'Vexis — Apps', ai:'Vexis — AI', social:'Vexis — Social', stats:'Vexis — Stats' };

    function getActiveTabEl() { return document.querySelector('.tab.active'); }
    function getTabPage(tab) { return tab.dataset.currentPage || 'home'; }
    function setTabPage(tab, page) {
      tab.dataset.currentPage = page;
      const titleSpan = tab.querySelector('.tab-title');
      if (titleSpan) titleSpan.textContent = PAGE_TITLES[page] || `Vexis — ${page.replace('ext:','').replace(/_/g,' ')}`;
    }

    function updateNavButtons() {
      navBack.classList.toggle('disabled', navIndex <= 0);
      navFwd.classList.toggle('disabled', navIndex >= navHistory.length - 1);
    }

    function updateURLBar(page) {
      urlHost.textContent = page.startsWith('ext:') ? page.substring(4) : page;
      document.title = PAGE_TITLES[page] || 'Vexis';
    }

    async function loadExternalHTML(filename) {
      gcRestoreLayout();
      try {
        const res = await fetch(filename);
        if (!res.ok) throw new Error('Not found');
        const html = await res.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const bodyContent = doc.body ? doc.body.innerHTML : '<div class="subpage-empty">Content loaded</div>';
        pageInner.innerHTML = bodyContent;
        // Re-execute inline scripts (innerHTML assignment doesn't run scripts)
        pageInner.querySelectorAll('script:not([src])').forEach(oldScript => {
          const newScript = document.createElement('script');
          newScript.textContent = oldScript.textContent;
          oldScript.replaceWith(newScript);
        });
        pageInner.style.animation = 'none'; pageInner.offsetHeight; pageInner.style.animation = 'fadeInScale 0.35s ease both';
      } catch (err) {
        pageInner.innerHTML = `<div class="subpage-empty">⚠️ Could not load "${filename}".<br>Make sure the file exists.</div>`;
      }
    }

    function navigateTo(page, addToHistory = true) {
      const activeTabEl = getActiveTabEl();
      if (!activeTabEl) return;
      if (page === currentPage && addToHistory) return;
      currentPage = page;
      setTabPage(activeTabEl, page);
      if (addToHistory) {
        navHistory = navHistory.slice(0, navIndex + 1);
        navHistory.push(page);
        navIndex = navHistory.length - 1;
      }
      updateURLBar(page);
      updateNavButtons();
      if (page.startsWith('ext:')) {
        loadExternalHTML(page.substring(4));
      } else {
        renderPage(page);
      }
      pageInner.scrollTop = 0;
    }

    function goBack() {
      if (navIndex > 0) { navIndex--; currentPage = navHistory[navIndex]; const tab = getActiveTabEl(); if (tab) setTabPage(tab, currentPage); updateURLBar(currentPage); updateNavButtons(); if (currentPage.startsWith('ext:')) loadExternalHTML(currentPage.substring(4)); else renderPage(currentPage, false); }
    }

    function goForward() {
      if (navIndex < navHistory.length - 1) { navIndex++; currentPage = navHistory[navIndex]; const tab = getActiveTabEl(); if (tab) setTabPage(tab, currentPage); updateURLBar(currentPage); updateNavButtons(); if (currentPage.startsWith('ext:')) loadExternalHTML(currentPage.substring(4)); else renderPage(currentPage, false); }
    }

    function switchToTab(tabEl) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tabEl.classList.add('active');
      const page = getTabPage(tabEl);
      currentPage = page;
      updateURLBar(page);
      updateNavButtons();
      if (page.startsWith('ext:')) loadExternalHTML(page.substring(4)); else renderPage(page, false);
      pageInner.scrollTop = 0;
    }

    function renderPage(page, animate = true) {
      gcRestoreLayout();
      const content = PAGE_TEMPLATES[page] || PAGE_TEMPLATES['home'];
      pageInner.innerHTML = content;
      if (animate) { pageInner.style.animation = 'none'; pageInner.offsetHeight; pageInner.style.animation = 'fadeInScale 0.35s ease both'; }
      bindPageEvents(page);
    }

    function bindPageEvents(page) {
      const backBtn = pageInner.querySelector('.subpage-back-btn');
      if (backBtn) backBtn.addEventListener('click', () => navigateTo('home'));
      // Sub-page cards with data-file attributes
      pageInner.querySelectorAll('.subpage-card[data-file]').forEach(card => {
        card.addEventListener('click', function() {
          const file = this.dataset.file;
          if (file) navigateTo('ext:' + file);
        });
      });
      // Home page cards
      if (page === 'home') {
        document.querySelectorAll('.card').forEach(card => {
          card.addEventListener('click', function() {
            const pageMap = { 'card-games':'games','card-tools':'tools','card-apps':'apps','card-ai':'ai','card-social':'social','card-stats':'stats' };
            for (const [cls, pg] of Object.entries(pageMap)) { if (this.classList.contains(cls)) { navigateTo(pg); return; } }
          });
        });
        const editBtn = pageInner.querySelector('.edit-btn');
        if (editBtn) {
          let editing = false;
          editBtn.addEventListener('click', function() {
            editing = !editing;
            this.textContent = editing ? 'Done' : 'Edit';
            pageInner.querySelectorAll('.pin-slot').forEach((slot, i) => {
              if (editing) { slot.style.animation = `wiggle 0.3s ${i*0.05}s ease both`; slot.style.border = '1.5px dashed rgba(var(--accent-rgb),0.4)'; }
              else { slot.style.animation = ''; slot.style.border = ''; }
            });
          });
        }
      }
      // AI page
      if (page === 'ai') {
        const toggleChat = pageInner.querySelector('#aiToggleChat');
        const toggleImage = pageInner.querySelector('#aiToggleImage');

        if (toggleChat && toggleImage && panelChat && panelImage) {
          toggleChat.addEventListener('click', () => { toggleChat.classList.add('active'); toggleImage.classList.remove('active'); panelChat.classList.add('active'); panelImage.classList.remove('active'); });
          toggleImage.addEventListener('click', () => { toggleImage.classList.add('active'); toggleChat.classList.remove('active'); panelImage.classList.add('active'); panelChat.classList.remove('active'); });
        }
        
        // Chat functionality
        let chatMessages = [{ role: 'system', content: 'You are Vexis AI, a helpful, friendly AI assistant.' }];
        const messagesContainer = pageInner.querySelector('#aiMessages');
        const chatInput = pageInner.querySelector('#aiChatInput');
        const sendBtn = pageInner.querySelector('#aiSendBtn');
        const quickChips = pageInner.querySelectorAll('.ai-quick-chip');
        
        function scrollToBottom() { setTimeout(() => { if (messagesContainer) messagesContainer.scrollTop = messagesContainer.scrollHeight; }, 0); }
        
        function addMessage(text, role) {
          const msg = document.createElement('div');
          msg.className = 'ai-msg ' + role;
          msg.textContent = text;
          messagesContainer.appendChild(msg);
          scrollToBottom();
        }
        
        function showTyping() {
          const typing = document.createElement('div');
          typing.className = 'ai-typing';
          typing.id = 'typingIndicator';
          typing.innerHTML = '<div class="ai-typing-dot"></div><div class="ai-typing-dot"></div><div class="ai-typing-dot"></div>';
          messagesContainer.appendChild(typing);
          scrollToBottom();
        }
        
        function removeTyping() {
          const typing = messagesContainer.querySelector('#typingIndicator');
          if (typing) typing.remove();
        }
        
        async function sendMessage() {
          const txt = chatInput.value.trim();
          if (!txt || sendBtn.disabled) return;
          
          addMessage(txt, 'user');
          chatMessages.push({ role: 'user', content: txt });
          chatInput.value = '';
          chatInput.style.height = 'auto';
          
          sendBtn.disabled = true;
          showTyping();
          
          try {
            const response = await fetch('http://localhost:3000/api/chat', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ messages: chatMessages })
            });
            
            removeTyping();
            
            if (!response.ok) throw new Error('API error: ' + response.status);
            const data = await response.json();
            const reply = data.reply;
            
            chatMessages.push({ role: 'assistant', content: reply });
            addMessage(reply, 'bot');
          } catch (error) {
            removeTyping();
            addMessage('❌ Error: ' + error.message + '\n\nMake sure the server is running on http://localhost:3000', 'bot');
            console.error('Chat error:', error);
          } finally {
            sendBtn.disabled = false;
            chatInput.focus();
          }
        }
        
        if (sendBtn && chatInput) {
          sendBtn.addEventListener('click', sendMessage);
          chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
              e.preventDefault();
              sendMessage();
            }
          });
          
          // Auto-resize textarea
          chatInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
          });
        }
        
        quickChips.forEach(chip => {
          chip.addEventListener('click', () => {
            chatInput.value = chip.textContent;
            chatInput.focus();
            sendMessage();
          });
        });

    const authBackdrop = document.getElementById('authBackdrop');

    const profileBtn = document.getElementById('profileBtn');
    const authTabs = document.getElementById('authTabs');
    const authForm = document.getElementById('authForm');
    const authEmail = document.getElementById('authEmail');
    const authPassword = document.getElementById('authPassword');
    const authError = document.getElementById('authError');
    const authSubmitBtn = document.getElementById('authSubmitBtn');
    const authGoogleBtn = document.getElementById('authGoogleBtn');
    const authFormContainer = document.getElementById('authFormContainer');
    const authLoggedIn = document.getElementById('authLoggedIn');
    const authUserEmail = document.getElementById('authUserEmail');
    const authSignOutBtn = document.getElementById('authSignOutBtn');
    let authMode = 'login';
    let currentUser = null;

    function openAuth() { authBackdrop.classList.add('open'); }
    function closeAuth() { authBackdrop.classList.remove('open'); authError.textContent = ''; }
    function updateAuthUI(user) {
      currentUser = user;
      if (user) {
        authFormContainer.style.display = 'none';
        authLoggedIn.style.display = '';
        authUserEmail.textContent = user.displayName || user.email || 'User';
        profileBtn.classList.add('logged-in');
        profileBtn.title = 'Logged in as ' + (user.displayName || user.email || 'User');
      } else {
        authFormContainer.style.display = '';
        authLoggedIn.style.display = 'none';
        profileBtn.classList.remove('logged-in');
        profileBtn.title = 'Profile / Login';
      }
    }
    authTabs.addEventListener('click', function(e) {
      if (e.target.classList.contains('auth-tab')) { authMode = e.target.dataset.tab; document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active')); e.target.classList.add('active'); authSubmitBtn.textContent = authMode === 'login' ? 'Login' : 'Sign Up'; authError.textContent = ''; }
    });
    authForm.addEventListener('submit', async function(e) {
      e.preventDefault(); authError.textContent = '';
      const email = authEmail.value.trim(); const password = authPassword.value;
      if (!email || !password) { authError.textContent = 'Please fill in all fields.'; return; }
      if (password.length < 6) { authError.textContent = 'Password must be at least 6 characters.'; return; }
      if (!firebaseReady) { updateAuthUI({ email: email }); closeAuth(); return; }
      try {
        if (authMode === 'signup') await firebaseAuth.createUserWithEmailAndPassword(email, password);
        else await firebaseAuth.signInWithEmailAndPassword(email, password);
        closeAuth();
      } catch (err) { authError.textContent = err.message.replace('Firebase: ', '').replace(/\(auth\/.*\)/,''); }
    });

      try { const provider = new firebase.auth.GoogleAuthProvider(); await firebaseAuth.signInWithPopup(provider); closeAuth(); }
      catch (err) { authError.textContent = err.message.replace('Firebase: ', '').replace(/\(auth\/.*\)/,''); }
    });

    function openProfileEdit() {
      profileDisplayName.value = currentUser?.displayName || '';
      profilePicPreview.style.backgroundImage = currentUser?.photoURL ? `url(${currentUser.photoURL})` : '';
      profilePicPreview.textContent = currentUser?.photoURL ? '' : '👤';

    });

    profileSaveBtn.addEventListener('click', async function() {
      const name = profileDisplayName.value.trim();
      const file = profilePicInput.files[0];
      try {
        if (file && firebaseReady && firebaseStorage && currentUser) {
          const storageRef = firebaseStorage.ref(`pfps/${currentUser.uid}/${Date.now()}_${file.name}`);
          await storageRef.put(file);
          const url = await storageRef.getDownloadURL();
          await currentUser.updateProfile({ photoURL: url });
        }
        if (name && currentUser) await currentUser.updateProfile({ displayName: name });
        if (currentUser) updateAuthUI(firebaseAuth.currentUser);
        closeProfileEdit();
      } catch (e) { alert('Update failed: ' + e.message); }
    });

    if (firebaseReady && firebaseAuth) { firebaseAuth.onAuthStateChanged(user => updateAuthUI(user)); }

    /* ═══════════════════════════════════════════
       TAB INTERACTIONS
    ═══════════════════════════════════════════ */
    function bindAllTabEvents() {
      document.querySelectorAll('.tab').forEach(tab => {
        const newTab = tab.cloneNode(true);
        tab.parentNode.replaceChild(newTab, tab);
      });
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', function(e) { if (e.target.classList.contains('tab-close')) return; if (this.classList.contains('active')) return; switchToTab(this); });
        const closeBtn = tab.querySelector('.tab-close');
        if (closeBtn) closeBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          const allTabs = document.querySelectorAll('.tab');
          if (allTabs.length <= 1) return;
          const t = this.closest('.tab');
          const wasActive = t.classList.contains('active');
          t.style.transition = 'all 0.2s'; t.style.transform = 'scale(0.8)'; t.style.opacity = '0';
          setTimeout(() => { t.remove(); if (wasActive) { const remaining = document.querySelector('.tab'); if (remaining) switchToTab(remaining); } }, 200);
        });
      });
    }
    bindAllTabEvents();

      nt.style.opacity = '0'; nt.style.transform = 'scale(0.8)';
      bar.insertBefore(nt, this);
      requestAnimationFrame(() => { nt.style.transition = 'all 0.2s'; nt.style.opacity = ''; nt.style.transform = ''; });
      nt.addEventListener('click', function(e) { if (e.target.classList.contains('tab-close')) return; if (this.classList.contains('active')) return; switchToTab(this); });
      nt.querySelector('.tab-close').addEventListener('click', function(e) {
        e.stopPropagation();
        const allTabs = document.querySelectorAll('.tab'); if (allTabs.length <= 1) return;
        const t = this.closest('.tab'); const wasActive = t.classList.contains('active');
        t.style.transition = 'all 0.2s'; t.style.transform = 'scale(0.8)'; t.style.opacity = '0';
        setTimeout(() => { t.remove(); if (wasActive) { const remaining = document.querySelector('.tab'); if (remaining) switchToTab(remaining); } }, 200);
      });
      switchToTab(nt);
    });

    /* ═══════════════════════════════════════════
       NAVIGATION BUTTONS
    ═══════════════════════════════════════════ */
    navBack.addEventListener('click', goBack);
    navFwd.addEventListener('click', goForward);
    reloadBtn.addEventListener('click', function() {
      const svg = this.querySelector('svg'); svg.style.transition = 'transform 0.6s ease'; svg.style.transform = 'rotate(360deg)';
      setTimeout(() => { svg.style.transition = ''; svg.style.transform = ''; }, 650);
      if (currentPage.startsWith('ext:')) loadExternalHTML(currentPage.substring(4)); else renderPage(currentPage, true);
    });

    document.getElementById('urlBarWrap').addEventListener('click', function() {
      this.style.borderColor = 'rgba(var(--accent-rgb),0.6)'; this.style.boxShadow = '0 0 0 3px rgba(var(--accent-rgb),0.18)';
      setTimeout(() => { this.style.borderColor = ''; this.style.boxShadow = ''; }, 1500);
    });

    /* ═══════════════════════════════════════════
       INIT
    ═══════════════════════════════════════════ */
    buildThemeGrid();
    applyTheme(activeTheme);
    renderPage('home');
    updateNavButtons();

    document.addEventListener('keydown', function(e) {
      if (e.ctrlKey || e.metaKey) {
        if (e.key === '[' || e.key === 'ArrowLeft') { e.preventDefault(); goBack(); }
        if (e.key === ']' || e.key === 'ArrowRight') { e.preventDefault(); goForward(); }
        if (e.key === 'r') { e.preventDefault(); reloadBtn.click(); }
        if (e.key === 't') { e.preventDefault(); document.getElementById('tabNewBtn').click(); }
        if (e.key === 'w') { e.preventDefault(); const at = getActiveTabEl(); if (at) { const cb = at.querySelector('.tab-close'); if (cb) cb.click(); } }
      }
      if (e.key === 'Escape') { if (settingsPanel.classList.contains('open')) closeSettings(); if (authBackdrop.classList.contains('open')) closeAuth(); if (profileBackdrop.classList.contains('open')) closeProfileEdit(); }
    });
  </script>
</body>
</html>
